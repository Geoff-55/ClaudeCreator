<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoreCreate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
          <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1a1a2e" stroke-width="1"/>
        </pattern>
      </defs>
      <rect width="1440" height="900" fill="url(#grid)"/>
      <polygon points="200,50 400,50 300,230" fill="none" stroke="#1e1b4b" stroke-width="1.5"/>
      <polygon points="1100,80 1350,80 1225,300" fill="none" stroke="#1e1b4b" stroke-width="1.5"/>
      <polygon points="50,400 200,600 50,750" fill="none" stroke="#1e1b4b" stroke-width="1"/>
      <polygon points="1300,350 1440,500 1300,650" fill="none" stroke="#1e1b4b" stroke-width="1"/>
      <polygon points="600,700 800,800 700,900" fill="none" stroke="#1e1b4b" stroke-width="1"/>
      <rect x="900" y="650" width="150" height="150" fill="none" stroke="#1e1b4b" stroke-width="1" transform="rotate(20 975 725)"/>
      <rect x="100" y="200" width="100" height="100" fill="none" stroke="#1e1b4b" stroke-width="1" transform="rotate(15 150 250)"/>
      <line x1="0" y1="450" x2="1440" y2="450" stroke="#12102a" stroke-width="1"/>
      <line x1="720" y1="0" x2="720" y2="900" stroke="#12102a" stroke-width="1"/>
      <circle cx="720" cy="450" r="300" fill="none" stroke="#150f2a" stroke-width="1"/>
      <circle cx="720" cy="450" r="200" fill="none" stroke="#150f2a" stroke-width="1"/>
    </svg>
  </div>

  <h1 class="title">CoreCreate</h1>

  <nav class="tabs">
    <a class="tab" id="drafts-tab" href="#">Drafts</a>
    <a class="tab" href="published.html">Published Games</a>
  </nav>

  <p style="text-align:center; color:#a855f7; opacity:0.35; font-size:0.72rem; letter-spacing:0.08em; font-family:monospace; margin-top:0.6rem;">* Not mobile compatible</p>

  <!-- Password modal -->
  <div id="modal-overlay" style="display:none; position:fixed; inset:0; z-index:100; background:#0d0d0fcc; display:none; align-items:center; justify-content:center;">
    <div style="border:1px solid #a855f7; background:#0d0d0f; padding:2.5rem 3rem; display:flex; flex-direction:column; align-items:center; gap:1.2rem; box-shadow:0 0 30px #7c3aed55; min-width:300px;">
      <p style="color:#a855f7; font-size:1rem; letter-spacing:0.1em; text-transform:uppercase; font-weight:600;">Password Required</p>
      <input id="pw-input" type="password" placeholder="Enter password"
        style="width:100%; padding:0.5rem 0.8rem; background:#0d0d0f; border:1px solid #a855f7; color:#d8b4fe; font-size:1rem; outline:none; letter-spacing:0.05em;"
        onkeydown="if(event.key==='Enter') checkPassword()"/>
      <p id="pw-error" style="color:#f87171; font-size:0.8rem; display:none;">Incorrect password.</p>
      <div style="display:flex; gap:1rem;">
        <button onclick="checkPassword()"
          style="padding:0.4rem 1.5rem; border:1px solid #a855f7; background:transparent; color:#a855f7; font-size:0.9rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;">
          Enter
        </button>
        <button onclick="closeModal()"
          style="padding:0.4rem 1.5rem; border:1px solid #4b4b6b; background:transparent; color:#6b6b9b; font-size:0.9rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('modal-overlay');
    const pwInput = document.getElementById('pw-input');
    const pwError = document.getElementById('pw-error');

    document.getElementById('drafts-tab').addEventListener('click', function(e) {
      e.preventDefault();
      pwInput.value = '';
      pwError.style.display = 'none';
      overlay.style.display = 'flex';
      setTimeout(() => pwInput.focus(), 50);
    });

    function checkPassword() {
      if (pwInput.value === 'Geoffery224500' || pwInput.value === '224500') {
        window.location.href = 'drafts.html';
      } else {
        pwError.style.display = 'block';
        pwInput.value = '';
        pwInput.focus();
      }
    }

    function closeModal() {
      overlay.style.display = 'none';
    }

    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeModal();
    });
  </script>

</body>
</html>
