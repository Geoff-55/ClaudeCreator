<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Published Games — CoreCreate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <a class="back-btn" href="index.html">Back</a>

  <div class="bg">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
          <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1a1a2e" stroke-width="1"/>
        </pattern>
      </defs>
      <rect width="1440" height="900" fill="url(#grid)"/>
      <polygon points="200,50 400,50 300,230" fill="none" stroke="#1e1b4b" stroke-width="1.5"/>
      <polygon points="1100,80 1350,80 1225,300" fill="none" stroke="#1e1b4b" stroke-width="1.5"/>
      <polygon points="50,400 200,600 50,750" fill="none" stroke="#1e1b4b" stroke-width="1"/>
      <polygon points="1300,350 1440,500 1300,650" fill="none" stroke="#1e1b4b" stroke-width="1"/>
      <polygon points="600,700 800,800 700,900" fill="none" stroke="#1e1b4b" stroke-width="1"/>
      <rect x="900" y="650" width="150" height="150" fill="none" stroke="#1e1b4b" stroke-width="1" transform="rotate(20 975 725)"/>
      <rect x="100" y="200" width="100" height="100" fill="none" stroke="#1e1b4b" stroke-width="1" transform="rotate(15 150 250)"/>
      <line x1="0" y1="450" x2="1440" y2="450" stroke="#12102a" stroke-width="1"/>
      <line x1="720" y1="0" x2="720" y2="900" stroke="#12102a" stroke-width="1"/>
      <circle cx="720" cy="450" r="300" fill="none" stroke="#150f2a" stroke-width="1"/>
      <circle cx="720" cy="450" r="200" fill="none" stroke="#150f2a" stroke-width="1"/>
    </svg>
  </div>

  <div style="position:relative; z-index:1; padding: 6rem 3rem 2rem; display:flex; flex-wrap:wrap; gap:1.5rem;">

    <!-- Pong 2 card -->
    <a href="games/pong2.html?from=published" style="text-decoration:none;">
      <div style="width:160px; border:1px solid #7c3aed; background:#0d0d0f; cursor:pointer; transition: box-shadow 0.2s;"
           onmouseover="this.style.boxShadow='0 0 18px #7c3aed'" onmouseout="this.style.boxShadow='none'">
        <div style="width:100%; height:100px; background:#07060f; overflow:hidden;">
          <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
            <defs>
              <filter id="tg" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur stdDeviation="2.5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="sun" x="-150%" y="-150%" width="400%" height="400%">
                <feGaussianBlur stdDeviation="12"/>
              </filter>
              <radialGradient id="sunG" cx="38%" cy="35%" r="65%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="30%" stop-color="#e9d5ff"/>
                <stop offset="70%" stop-color="#a855f7" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#3b0764" stop-opacity="0"/>
              </radialGradient>
            </defs>

            <!-- Space background -->
            <rect width="160" height="100" fill="#07060f"/>

            <!-- Nebula -->
            <circle cx="80" cy="52" r="70" fill="url(#sunG)" opacity="0.18"/>

            <!-- Grid -->
            <g stroke="#0f0825" stroke-width="0.4" opacity="0.9">
              <line x1="0" y1="25" x2="160" y2="25"/><line x1="0" y1="50" x2="160" y2="50"/>
              <line x1="0" y1="75" x2="160" y2="75"/><line x1="40" y1="0" x2="40" y2="100"/>
              <line x1="80" y1="0" x2="80" y2="100"/><line x1="120" y1="0" x2="120" y2="100"/>
            </g>

            <!-- Faint geo shapes -->
            <polygon points="8,5 38,18 15,38" fill="none" stroke="#4b1a80" stroke-width="0.7" opacity="0.5"/>
            <polygon points="135,72 158,60 155,90" fill="none" stroke="#4b1a80" stroke-width="0.7" opacity="0.5"/>

            <!-- Stars -->
            <circle cx="14" cy="9" r="0.7" fill="white" opacity="0.55"/>
            <circle cx="48" cy="6" r="0.5" fill="white" opacity="0.4"/>
            <circle cx="142" cy="11" r="0.8" fill="white" opacity="0.6"/>
            <circle cx="128" cy="88" r="0.6" fill="white" opacity="0.45"/>
            <circle cx="22" cy="78" r="0.5" fill="white" opacity="0.5"/>
            <circle cx="153" cy="48" r="0.7" fill="white" opacity="0.35"/>
            <circle cx="6" cy="55" r="0.6" fill="white" opacity="0.4"/>
            <circle cx="110" cy="94" r="0.5" fill="white" opacity="0.4"/>
            <circle cx="158" cy="22" r="0.5" fill="white" opacity="0.3"/>
            <circle cx="72" cy="96" r="0.4" fill="white" opacity="0.35"/>

            <!-- Sun glow (outer, blurred) -->
            <circle cx="80" cy="52" r="26" fill="url(#sunG)" filter="url(#sun)" opacity="0.85"/>

            <!-- Sun core -->
            <circle cx="80" cy="52" r="18" fill="url(#sunG)"/>
            <circle cx="78" cy="50" r="6" fill="white" opacity="0.92" filter="url(#tg)"/>

            <!-- PONG — top half -->
            <text x="80" y="33" text-anchor="middle" font-family="monospace" font-size="24" font-weight="900"
              fill="none" stroke="#e9d5ff" stroke-width="0.9" letter-spacing="2" filter="url(#tg)">PONG</text>

            <!-- 2 — bottom half -->
            <text x="80" y="82" text-anchor="middle" font-family="monospace" font-size="32" font-weight="900"
              fill="none" stroke="#ffffff" stroke-width="0.9" filter="url(#tg)">2</text>
          </svg>
        </div>
        <div style="padding:0.5rem 0.7rem; border-top:1px solid #3b1a6b;">
          <p style="color:#d8b4fe; font-family:monospace; font-size:0.8rem; font-weight:600; letter-spacing:0.05em;">Pong 2</p>
          <p style="color:#a855f7; font-family:monospace; font-size:0.65rem; margin-top:2px;">Published</p>
        </div>
      </div>
    </a>

  </div>

</body>
</html>
