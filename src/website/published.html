<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Published Games — CoreCreate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <a class="back-btn" href="index.html">Back</a>

  <div class="bg">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
          <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1a1a2e" stroke-width="1"/>
        </pattern>
      </defs>
      <rect width="1440" height="900" fill="url(#grid)"/>
      <polygon points="200,50 400,50 300,230" fill="none" stroke="#1e1b4b" stroke-width="1.5"/>
      <polygon points="1100,80 1350,80 1225,300" fill="none" stroke="#1e1b4b" stroke-width="1.5"/>
      <polygon points="50,400 200,600 50,750" fill="none" stroke="#1e1b4b" stroke-width="1"/>
      <polygon points="1300,350 1440,500 1300,650" fill="none" stroke="#1e1b4b" stroke-width="1"/>
      <polygon points="600,700 800,800 700,900" fill="none" stroke="#1e1b4b" stroke-width="1"/>
      <rect x="900" y="650" width="150" height="150" fill="none" stroke="#1e1b4b" stroke-width="1" transform="rotate(20 975 725)"/>
      <rect x="100" y="200" width="100" height="100" fill="none" stroke="#1e1b4b" stroke-width="1" transform="rotate(15 150 250)"/>
      <line x1="0" y1="450" x2="1440" y2="450" stroke="#12102a" stroke-width="1"/>
      <line x1="720" y1="0" x2="720" y2="900" stroke="#12102a" stroke-width="1"/>
      <circle cx="720" cy="450" r="300" fill="none" stroke="#150f2a" stroke-width="1"/>
      <circle cx="720" cy="450" r="200" fill="none" stroke="#150f2a" stroke-width="1"/>
    </svg>
  </div>

  <div style="position:relative; z-index:1; padding: 6rem 3rem 2rem; display:flex; flex-wrap:wrap; gap:1.5rem;">

    <!-- Pong 2 card -->
    <a href="games/pong2.html?from=published" style="text-decoration:none;">
      <div style="width:160px; border:1px solid #7c3aed; background:#0d0d0f; cursor:pointer; transition: box-shadow 0.2s;"
           onmouseover="this.style.boxShadow='0 0 18px #7c3aed'" onmouseout="this.style.boxShadow='none'">
        <div style="width:100%; height:100px; background:#080010; overflow:hidden;">
          <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
            <defs>
              <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              <filter id="ballglow"><feGaussianBlur stdDeviation="3.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>

            <!-- Background -->
            <rect width="160" height="100" fill="#080010"/>

            <!-- Subtle grid -->
            <g stroke="#0f0825" stroke-width="0.5">
              <line x1="0" y1="33" x2="160" y2="33"/>
              <line x1="0" y1="66" x2="160" y2="66"/>
              <line x1="53" y1="0" x2="53" y2="100"/>
              <line x1="107" y1="0" x2="107" y2="100"/>
            </g>

            <!-- Title strip -->
            <rect width="160" height="17" fill="#06000f"/>
            <text x="80" y="12" text-anchor="middle" font-family="monospace" font-size="10" font-weight="900"
              fill="none" stroke="#a855f7" stroke-width="0.7" letter-spacing="4" filter="url(#glow)">PONG 2</text>

            <!-- Field border -->
            <rect x="4" y="19" width="152" height="77" fill="none" stroke="#a855f7" stroke-width="1" filter="url(#glow)"/>

            <!-- Score -->
            <text x="66" y="31" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#d8b4fe">3</text>
            <text x="80" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b1a60">:</text>
            <text x="94" y="31" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#d8b4fe">2</text>

            <!-- Center dashed line -->
            <line x1="80" y1="19" x2="80" y2="96" stroke="#1e0e40" stroke-width="1" stroke-dasharray="5,4"/>

            <!-- Left paddle -->
            <rect x="7" y="46" width="5" height="24" rx="1" fill="#a855f7" filter="url(#glow)"/>

            <!-- Right paddle -->
            <rect x="148" y="54" width="5" height="24" rx="1" fill="#a855f7" filter="url(#glow)"/>

            <!-- Obstacle (diamond) -->
            <polygon points="58,55 65,62 58,69 51,62" fill="#1a0430" stroke="#6b3aed" stroke-width="0.8"/>

            <!-- Ball -->
            <circle cx="102" cy="64" r="4" fill="white" filter="url(#ballglow)"/>

            <!-- Bottom tag -->
            <text x="80" y="93" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#2a1248" letter-spacing="1">⚡ CHAOS MODIFIERS ⚡</text>
          </svg>
        </div>
        <div style="padding:0.5rem 0.7rem; border-top:1px solid #3b1a6b;">
          <p style="color:#d8b4fe; font-family:monospace; font-size:0.8rem; font-weight:600; letter-spacing:0.05em;">Pong 2</p>
          <p style="color:#a855f7; font-family:monospace; font-size:0.65rem; margin-top:2px;">Published</p>
        </div>
      </div>
    </a>

  </div>

</body>
</html>
