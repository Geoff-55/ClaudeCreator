<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong 2</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      display: block;
      cursor: default;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
    }
    #portrait-warn {
      display: none;
      position: fixed;
      inset: 0;
      background: #0d0d0f;
      color: #a855f7;
      font-family: monospace;
      font-size: 1.1rem;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 999;
      text-align: center;
      padding: 2rem;
    }
    #portrait-warn .icon { font-size: 3rem; }
    @media (orientation: portrait) and (max-width: 900px) {
      #portrait-warn { display: flex; }
    }
    .back-btn {
      position: fixed;
      top: 1rem; right: 1.2rem;
      padding: 0.35rem 1rem;
      border: 1px solid #a855f7;
      color: #a855f7;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.08em;
      text-decoration: none; text-transform: uppercase;
      font-family: monospace;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .back-btn:hover { background: #a855f720; box-shadow: 0 0 10px #a855f7; }
  </style>
</head>
<body>
  <div id="portrait-warn">
    <div class="icon">&#8635;</div>
    <div>Rotate your device to play</div>
  </div>
  <a class="back-btn" id="backBtn" href="#">Back</a>
  <canvas id="c"></canvas>

<script>
// --- Back button context ---
(function() {
  const p = new URLSearchParams(window.location.search);
  const from = p.get('from') || 'drafts';
  document.getElementById('backBtn').href = from === 'published' ? '../published.html' : '../drafts.html';
})();

// ===================== AUDIO =====================
let audioCtx = null, masterGain = null, musicStarted = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.22;
  masterGain.connect(audioCtx.destination);
}

function startMusic() {
  if (musicStarted || !audioCtx) return;
  musicStarted = true;
  for (const detune of [-4, 4]) {
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = 65.41; osc.detune.value = detune;
    g.gain.value = 0.09;
    osc.connect(g); g.connect(masterGain); osc.start();
  }
  scheduleMelody();
}

const PENTA = [130.81, 164.81, 196.00, 246.94, 261.63, 329.63, 392.00];
function scheduleMelody() {
  if (!audioCtx || !musicStarted) return;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = PENTA[Math.floor(Math.random() * PENTA.length)];
  g.gain.setValueAtTime(0, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.4);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.8);
  osc.connect(g); g.connect(masterGain);
  osc.start(); osc.stop(audioCtx.currentTime + 2.8);
  setTimeout(scheduleMelody, (1.8 + Math.random() * 2.2) * 1000);
}

function playHit(freq) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = 'square'; osc.frequency.value = freq;
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
  osc.connect(g); g.connect(masterGain);
  osc.start(); osc.stop(audioCtx.currentTime + 0.06);
}

function playModQueued() {
  if (!audioCtx) return;
  // Gentle rising sine chime
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(440, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(660, audioCtx.currentTime + 0.35);
  g.gain.setValueAtTime(0, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0.10, audioCtx.currentTime + 0.05);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.55);
  osc.connect(g); g.connect(masterGain);
  osc.start(); osc.stop(audioCtx.currentTime + 0.55);
}

function playModActivated() {
  if (!audioCtx) return;
  // Two-note bright chord — enthusiastic but not loud
  for (const [freq, delay] of [[523.25, 0], [783.99, 0.04]]) {
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0, audioCtx.currentTime + delay);
    g.gain.linearRampToValueAtTime(0.13, audioCtx.currentTime + delay + 0.03);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + 0.45);
    osc.connect(g); g.connect(masterGain);
    osc.start(audioCtx.currentTime + delay);
    osc.stop(audioCtx.currentTime + delay + 0.45);
  }
}

// Try to autoplay immediately; fall back to first interaction if browser blocks it
initAudio();
audioCtx.resume().then(() => startMusic());
const unlockAudio = () => audioCtx.resume().then(() => startMusic());
document.addEventListener('click',      unlockAudio, { once: true });
document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });

// ===================== GAME =====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Canvas: wider to give left panel room
const W = 1020, H = 580;
canvas.width = W; canvas.height = H;

// Left panel width + field layout
const PANEL_W = 170;
const PADDLE_W = 12, PADDLE_H_BASE = 80, BALL_R_BASE = 10;
const BALL_SPEED_BASE = 4.5, MOD_INTERVAL = 5;
const OBS_SIZE = 42;
const OBS_SHAPES = ['square', 'triangle', 'circle', 'diamond'];
const MOD_TYPES = ['SPEED_UP', 'BALL_SHRINK', 'PADDLE_SHRINK', 'OBSTACLE', 'FIELD_SHRINK'];
const MOD_LABELS = {
  SPEED_UP:      '⚡ Speed +25%',
  BALL_SHRINK:   '● Ball -25%',
  PADDLE_SHRINK: '▌ Paddle -25%',
  OBSTACLE:      '◆ Random Object',
  FIELD_SHRINK:  '⬜ Field -10%',
};
const AI_CFG = {
  'ai-easy':   { speed: 180, error: 55 },
  'ai-medium': { speed: 290, error: 18 },
  'ai-hard':   { speed: 430, error: 4  },
};

// States: menu | score-select | playing | win
let state = 'menu', mode = null, pendingMode = null;
let targetScore = 10;
let menuHover = -1, scoreHover = -1, winner = '';

let field, p1, p2, ball, obstacles, modifiers, modTimer, totalTime;
let modQueued = false, pendingMod = null;
let countdown = 0, countdownTimer = 0;
let fieldPulse = 0, fieldPulseColor = '#a855f7';
let roundTime = 0;

function currentInterval() { return Math.max(1, MOD_INTERVAL - Math.floor(roundTime / 20)); }

function makeField() { return { x: PANEL_W + 10, y: 50, w: W - PANEL_W - 30, h: H - 70 }; }

function resetGame() {
  field = makeField();
  p1 = { x: field.x + field.w - 18, y: field.y + field.h / 2, w: PADDLE_W, h: PADDLE_H_BASE, score: 0 };
  p2 = { x: field.x + 6,            y: field.y + field.h / 2, w: PADDLE_W, h: PADDLE_H_BASE, score: 0 };
  ball = { x: field.x + field.w / 2, y: field.y + field.h / 2, r: BALL_R_BASE, speed: BALL_SPEED_BASE, vx: 0, vy: 0 };
  obstacles = []; modifiers = [];
  modTimer = MOD_INTERVAL; modQueued = false; pendingMod = null;
  totalTime = 0; roundTime = 0; fieldPulse = 0;
  startCountdown();
}

function resetRound() {
  field = makeField();
  p1.x = field.x + field.w - 18; p1.y = field.y + field.h / 2; p1.h = PADDLE_H_BASE;
  p2.x = field.x + 6;            p2.y = field.y + field.h / 2; p2.h = PADDLE_H_BASE;
  ball.r = BALL_R_BASE; ball.speed = BALL_SPEED_BASE;
  ball.vx = 0; ball.vy = 0;
  ball.x = field.x + field.w / 2; ball.y = field.y + field.h / 2;
  obstacles = []; modifiers = [];
  modTimer = MOD_INTERVAL; modQueued = false; pendingMod = null;
  roundTime = 0;
  startCountdown();
}

function startCountdown() { countdown = 3; countdownTimer = 0.75; }

function launchBall() {
  const angle = (Math.random() * 60 - 30) * (Math.PI / 180);
  const dir = Math.random() < 0.5 ? 1 : -1;
  ball.vx = dir * ball.speed * Math.cos(angle);
  ball.vy = ball.speed * Math.sin(angle);
}

function normBall() {
  const s = Math.hypot(ball.vx, ball.vy);
  if (s === 0) return;
  ball.vx = (ball.vx / s) * ball.speed;
  ball.vy = (ball.vy / s) * ball.speed;
}

// --- Modifiers ---
function queueMod() {
  pendingMod = MOD_TYPES[Math.floor(Math.random() * MOD_TYPES.length)];
  modQueued = true;
  fieldPulse = 1; fieldPulseColor = '#818cf8';
  playModQueued();
}

function applyMod() {
  const type = pendingMod;
  modQueued = false; pendingMod = null;
  modifiers.push(type);
  fieldPulse = 1; fieldPulseColor = '#f472b6';
  playModActivated();
  switch (type) {
    case 'SPEED_UP':
      ball.speed *= 1.25; normBall(); break;
    case 'BALL_SHRINK':
      ball.r = Math.max(3, ball.r * 0.75); break;
    case 'PADDLE_SHRINK':
      p1.h = Math.max(18, p1.h * 0.75);
      p2.h = Math.max(18, p2.h * 0.75);
      clamp(p1); clamp(p2); break;
    case 'OBSTACLE': {
      const cx = field.x + field.w * 0.3 + Math.random() * field.w * 0.4;
      const cy = field.y + field.h * 0.2 + Math.random() * field.h * 0.6;
      const shape = OBS_SHAPES[Math.floor(Math.random() * OBS_SHAPES.length)];
      obstacles.push({ x: cx - OBS_SIZE / 2, y: cy - OBS_SIZE / 2, w: OBS_SIZE, h: OBS_SIZE, shape });
      break;
    }
    case 'FIELD_SHRINK': {
      const sx = field.w * 0.05, sy = field.h * 0.05;
      field.x += sx; field.y += sy; field.w -= sx * 2; field.h -= sy * 2;
      p1.x = field.x + field.w - 18; p2.x = field.x + 6;
      clamp(p1); clamp(p2);
      ball.x = Math.max(field.x + ball.r, Math.min(field.x + field.w - ball.r, ball.x));
      ball.y = Math.max(field.y + ball.r, Math.min(field.y + field.h - ball.r, ball.y));
      break;
    }
  }
  modTimer = currentInterval();
}

function clamp(p) {
  p.y = Math.max(field.y + p.h / 2, Math.min(field.y + field.h - p.h / 2, p.y));
}

// --- Input ---
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','w','s','W','S'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.key] = false);

// --- Touch input ---
const touch = { p1Up: false, p1Down: false, p2Up: false, p2Down: false };

function handleTouches(e) {
  e.preventDefault();
  initAudio(); startMusic();
  touch.p1Up = touch.p1Down = touch.p2Up = touch.p2Down = false;
  const r = canvas.getBoundingClientRect();
  const scaleX = W / r.width;
  const scaleY = H / r.height;
  for (const t of e.touches) {
    const cx = (t.clientX - r.left) * scaleX;
    const cy = (t.clientY - r.top) * scaleY;
    const isTop = cy < H / 2;
    if (state === 'playing' && mode === 'pvp') {
      if (cx < W / 2) { if (isTop) touch.p2Up = true; else touch.p2Down = true; }
      else            { if (isTop) touch.p1Up = true; else touch.p1Down = true; }
    } else {
      if (isTop) touch.p1Up = true; else touch.p1Down = true;
    }
  }
}

canvas.addEventListener('touchstart', e => {
  handleTouches(e);
  // Fire click logic for menus
  if (state !== 'playing') {
    const r = canvas.getBoundingClientRect();
    const t = e.touches[0];
    const mx = (t.clientX - r.left) * (W / r.width);
    const my = (t.clientY - r.top) * (H / r.height);
    if (state === 'menu') {
      for (let i = 0; i < 4; i++) {
        const b = menuBox(i);
        if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) {
          pendingMode = MENU_MODES[i]; state = 'score-select'; scoreHover = -1; break;
        }
      }
    } else if (state === 'score-select') {
      for (let i = 0; i < 4; i++) {
        const b = scoreBox(i);
        if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) {
          mode = pendingMode; targetScore = SCORE_OPTS[i]; resetGame(); state = 'playing'; break;
        }
      }
    } else if (state === 'win') {
      state = 'menu'; menuHover = -1;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove',  handleTouches, { passive: false });
canvas.addEventListener('touchend',   e => { handleTouches(e); }, { passive: false });
canvas.addEventListener('touchcancel',e => { touch.p1Up = touch.p1Down = touch.p2Up = touch.p2Down = false; }, { passive: false });

// --- AI ---
function updateAI(dt) {
  const cfg = AI_CFG[mode];
  const target = ball.y + (Math.random() - 0.5) * cfg.error;
  const dist = target - p2.y;
  p2.y += dist > 0
    ? Math.min(dist, cfg.speed * dt)
    : Math.max(dist, -cfg.speed * dt);
  clamp(p2);
}

// --- Update ---
function update(dt) {
  if (countdown > 0) {
    countdownTimer -= dt;
    if (countdownTimer <= 0) {
      countdown--;
      if (countdown === 0) launchBall();
      else countdownTimer = 0.75;
    }
    if (fieldPulse > 0) fieldPulse = Math.max(0, fieldPulse - dt * 1.8);
    return;
  }

  totalTime += dt;
  roundTime += dt;
  if (fieldPulse > 0) fieldPulse = Math.max(0, fieldPulse - dt * 1.8);

  if (!modQueued) {
    const interval = currentInterval();
    if (modTimer > interval) modTimer = interval;
    modTimer -= dt;
    if (modTimer <= 0) queueMod();
  } else {
    const midL = field.x + field.w * 0.45;
    const midR = field.x + field.w * 0.55;
    if (ball.x >= midL && ball.x <= midR) applyMod();
  }

  const spd = 340 * dt;
  if (keys['ArrowUp']   || touch.p1Up)   { p1.y -= spd; clamp(p1); }
  if (keys['ArrowDown'] || touch.p1Down) { p1.y += spd; clamp(p1); }
  if (mode === 'pvp') {
    if (keys['w'] || keys['W'] || touch.p2Up)   { p2.y -= spd; clamp(p2); }
    if (keys['s'] || keys['S'] || touch.p2Down) { p2.y += spd; clamp(p2); }
  } else {
    updateAI(dt);
  }

  ball.x += ball.vx * 60 * dt;
  ball.y += ball.vy * 60 * dt;

  if (ball.y - ball.r < field.y) {
    ball.y = field.y + ball.r; ball.vy = Math.abs(ball.vy); playHit(200);
  }
  if (ball.y + ball.r > field.y + field.h) {
    ball.y = field.y + field.h - ball.r; ball.vy = -Math.abs(ball.vy); playHit(200);
  }
  if (hitsPaddle(p1) && ball.vx > 0) {
    ball.vx = -Math.abs(ball.vx);
    ball.vy += ((ball.y - p1.y) / (p1.h / 2)) * 1.5;
    normBall(); playHit(330);
  }
  if (hitsPaddle(p2) && ball.vx < 0) {
    ball.vx = Math.abs(ball.vx);
    ball.vy += ((ball.y - p2.y) / (p2.h / 2)) * 1.5;
    normBall(); playHit(330);
  }
  for (const obs of obstacles) resolveObs(obs);

  if (ball.x - ball.r < field.x) {
    p1.score++;
    if (targetScore !== Infinity && p1.score >= targetScore) {
      winner = mode === 'pvp' ? 'Player 1' : 'Player'; state = 'win'; return;
    }
    resetRound();
  } else if (ball.x + ball.r > field.x + field.w) {
    p2.score++;
    if (targetScore !== Infinity && p2.score >= targetScore) {
      winner = mode === 'pvp' ? 'Player 2' : 'AI'; state = 'win'; return;
    }
    resetRound();
  }
}

function hitsPaddle(p) {
  return ball.x + ball.r > p.x && ball.x - ball.r < p.x + p.w &&
         ball.y + ball.r > p.y - p.h / 2 && ball.y - ball.r < p.y + p.h / 2;
}

function resolveObs(obs) {
  const cx = Math.max(obs.x, Math.min(ball.x, obs.x + obs.w));
  const cy = Math.max(obs.y, Math.min(ball.y, obs.y + obs.h));
  const dx = ball.x - cx, dy = ball.y - cy;
  const dist = Math.hypot(dx, dy);
  if (dist < ball.r && dist > 0) {
    if (Math.abs(dx) >= Math.abs(dy)) {
      ball.vx = dx > 0 ? Math.abs(ball.vx) : -Math.abs(ball.vx);
    } else {
      ball.vy = dy > 0 ? Math.abs(ball.vy) : -Math.abs(ball.vy);
    }
    playHit(260);
  }
}

// ===================== SPACE BACKGROUND =====================
const BG = { stars: [], brightStars: [], conLines: [] };

function initBg() {
  for (let i = 0; i < 140; i++) {
    BG.stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.0 + 0.2, o: Math.random() * 0.45 + 0.1 });
  }
  for (let i = 0; i < 18; i++) {
    BG.brightStars.push({ x: Math.random() * W, y: Math.random() * H });
  }
  for (let i = 0; i < BG.brightStars.length; i++) {
    for (let j = i + 1; j < BG.brightStars.length; j++) {
      const a = BG.brightStars[i], b = BG.brightStars[j];
      if (Math.hypot(a.x - b.x, a.y - b.y) < 180 && Math.random() < 0.45) {
        BG.conLines.push([a, b]);
      }
    }
  }
}

// ===================== DRAWING =====================
function drawBg() {
  ctx.fillStyle = '#0d0d0f';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#131320'; ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 45) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 45) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function drawSpaceBg() {
  // Deep space base
  ctx.fillStyle = '#07060f';
  ctx.fillRect(0, 0, W, H);

  // Nebula blobs
  const neb1 = ctx.createRadialGradient(W * 0.68, H * 0.32, 0, W * 0.68, H * 0.32, 230);
  neb1.addColorStop(0, 'rgba(110, 50, 210, 0.10)');
  neb1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = neb1; ctx.fillRect(0, 0, W, H);

  const neb2 = ctx.createRadialGradient(W * 0.18, H * 0.28, 0, W * 0.18, H * 0.28, 160);
  neb2.addColorStop(0, 'rgba(25, 55, 200, 0.08)');
  neb2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = neb2; ctx.fillRect(0, 0, W, H);

  // Distant planet (bottom-left)
  const px = 95, py = H - 55, pr = 36;
  const pGrad = ctx.createRadialGradient(px - 10, py - 10, 3, px, py, pr);
  pGrad.addColorStop(0, 'rgba(90, 45, 140, 0.45)');
  pGrad.addColorStop(0.7, 'rgba(40, 15, 80, 0.25)');
  pGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI * 2);
  ctx.fillStyle = pGrad; ctx.fill();
  ctx.strokeStyle = 'rgba(130, 65, 200, 0.22)'; ctx.lineWidth = 0.8; ctx.stroke();

  // Large geometric shapes (faint)
  ctx.strokeStyle = 'rgba(75, 35, 130, 0.18)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(130, 18); ctx.lineTo(310, 72); ctx.lineTo(185, 165); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(810, 28); ctx.lineTo(995, 58); ctx.lineTo(905, 205); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(490, 340); ctx.lineTo(558, 418); ctx.lineTo(490, 496); ctx.lineTo(422, 418); ctx.closePath(); ctx.stroke();

  // Constellation lines
  ctx.strokeStyle = 'rgba(100, 55, 170, 0.18)'; ctx.lineWidth = 0.5;
  for (const [a, b] of BG.conLines) {
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }

  // Bright stars
  for (const s of BG.brightStars) {
    ctx.beginPath(); ctx.arc(s.x, s.y, 1.4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(210, 190, 255, 0.75)'; ctx.fill();
  }

  // Small stars
  for (const s of BG.stars) {
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 200, 255, ${s.o})`; ctx.fill();
  }

  // Grid on top
  ctx.strokeStyle = '#131320'; ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 45) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 45) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function neon(color, blur) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
function noNeon() { ctx.shadowBlur = 0; }

function drawObstacle(obs) {
  const cx = obs.x + obs.w / 2, cy = obs.y + obs.h / 2, r = obs.w / 2;
  ctx.fillStyle = '#3b0764'; ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 1.5;
  neon('#7c3aed', 14);
  ctx.beginPath();
  switch (obs.shape) {
    case 'square':   ctx.rect(obs.x, obs.y, obs.w, obs.h); break;
    case 'circle':   ctx.arc(cx, cy, r, 0, Math.PI * 2); break;
    case 'triangle':
      ctx.moveTo(cx, obs.y); ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
      ctx.lineTo(obs.x, obs.y + obs.h); ctx.closePath(); break;
    case 'diamond':
      ctx.moveTo(cx, obs.y); ctx.lineTo(obs.x + obs.w, cy);
      ctx.lineTo(cx, obs.y + obs.h); ctx.lineTo(obs.x, cy); ctx.closePath(); break;
  }
  ctx.fill(); ctx.stroke(); noNeon();
}

function drawLeftPanel() {
  // Panel background
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, PANEL_W, H);
  ctx.strokeStyle = '#1e1040'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PANEL_W, 0); ctx.lineTo(PANEL_W, H); ctx.stroke();

  // Section label
  ctx.textAlign = 'left'; ctx.font = 'bold 10px monospace';
  ctx.fillStyle = '#3b2060';
  ctx.fillText('ACTIVE MODIFIERS', 10, 30);

  if (modifiers.length === 0) {
    ctx.fillStyle = '#2a1a40'; ctx.font = '11px monospace';
    ctx.fillText('none yet', 10, 50);
    return;
  }

  const counts = {};
  for (const m of modifiers) counts[m] = (counts[m] || 0) + 1;
  ctx.font = '11px monospace';
  let ly = 50;
  for (const [k, v] of Object.entries(counts)) {
    ctx.fillStyle = '#5b3a8b';
    ctx.fillText(`${MOD_LABELS[k]}`, 10, ly);
    if (v > 1) {
      ctx.fillStyle = '#a855f7';
      ctx.fillText(`  x${v}`, 10, ly + 13);
      ly += 13;
    }
    ly += 18;
  }
}

function drawGame() {
  drawSpaceBg();
  drawLeftPanel();

  // Field border with pulse
  const pulseGlow = 8 + fieldPulse * 28;
  const borderColor = fieldPulse > 0
    ? lerpColor('#a855f7', fieldPulseColor, fieldPulse)
    : '#a855f7';
  ctx.strokeStyle = borderColor; ctx.lineWidth = 1.5;
  neon(borderColor, pulseGlow);
  ctx.strokeRect(field.x, field.y, field.w, field.h);
  noNeon();

  // Center dashes
  ctx.setLineDash([8, 8]); ctx.strokeStyle = '#1e1040'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(field.x + field.w/2, field.y); ctx.lineTo(field.x + field.w/2, field.y + field.h); ctx.stroke();
  ctx.setLineDash([]);

  // Paddles
  for (const p of [p1, p2]) {
    ctx.fillStyle = '#a855f7'; neon('#a855f7', 14);
    ctx.fillRect(p.x, p.y - p.h/2, p.w, p.h); noNeon();
  }

  for (const obs of obstacles) drawObstacle(obs);

  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff'; neon('#ffffff', 18); ctx.fill(); noNeon();

  drawHUD();

  if (countdown > 0) {
    ctx.textAlign = 'center'; ctx.font = 'bold 100px monospace';
    ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 2;
    neon('#a855f7', 35);
    ctx.strokeText(countdown, field.x + field.w / 2, field.y + field.h / 2 + 36);
    noNeon();
  }
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
  const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  const r = Math.round(ar + (br - ar) * t);
  const g = Math.round(ag + (bg - ag) * t);
  const bl = Math.round(ab + (bb - ab) * t);
  return `rgb(${r},${g},${bl})`;
}

function drawHUD() {
  const mid = field.x + field.w / 2;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#d8b4fe'; ctx.font = 'bold 28px monospace';
  ctx.fillText(p2.score, mid - 50, 36);
  ctx.fillText(p1.score, mid + 50, 36);
  ctx.fillStyle = '#4b2a7a'; ctx.font = 'bold 20px monospace';
  ctx.fillText(':', mid, 36);
  ctx.font = '11px monospace'; ctx.fillStyle = '#6b4a9b';
  ctx.fillText(mode === 'pvp' ? 'P2' : 'AI', mid - 50, 48);
  ctx.fillText('P1', mid + 50, 48);

  // Score goal
  ctx.font = '11px monospace'; ctx.fillStyle = '#3b2060';
  ctx.fillText(targetScore === Infinity ? 'Endless' : `First to ${targetScore}`, mid, 60);

  const mm = String(Math.floor(totalTime / 60)).padStart(2, '0');
  const ss = String(Math.floor(totalTime % 60)).padStart(2, '0');
  ctx.textAlign = 'right'; ctx.fillStyle = '#4b4b6b'; ctx.font = '13px monospace';
  ctx.fillText(`${mm}:${ss}`, W - 8, 20);

  ctx.textAlign = 'left'; ctx.font = '13px monospace';
  if (modQueued) {
    ctx.fillStyle = Math.floor(Date.now() / 300) % 2 === 0 ? '#f472b6' : '#f87171';
    ctx.fillText('MOD QUEUED!', field.x + 8, 20);
  } else {
    const flash = modTimer < 2 && Math.floor(modTimer * 4) % 2 === 0;
    ctx.fillStyle = flash ? '#f472b6' : modTimer < 2 ? '#f87171' : '#6b6b9b';
    ctx.fillText(`mod in: ${Math.ceil(modTimer)}s`, field.x + 8, 20);
  }
}

// --- Menu screens ---
function drawMenu() {
  drawBg();
  ctx.textAlign = 'center';
  ctx.font = 'bold 80px monospace'; ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 2;
  neon('#a855f7', 25); ctx.strokeText('PONG 2', W/2, H/2 - 140); noNeon();
  ctx.font = '14px monospace'; ctx.fillStyle = '#4b2a6b';
  ctx.fillText('modifiers · chaos', W/2, H/2 - 100);

  const items = ['vs AI — Easy', 'vs AI — Medium', 'vs AI — Hard', 'vs Player 2'];
  items.forEach((label, i) => {
    const bx = W/2 - 160, by = H/2 - 55 + i * 52, bw = 320, bh = 40;
    const hov = menuHover === i;
    ctx.strokeStyle = hov ? '#d8b4fe' : '#7c3aed'; ctx.lineWidth = 1;
    ctx.fillStyle = hov ? '#a855f715' : 'transparent';
    neon('#a855f7', hov ? 12 : 0);
    ctx.fillRect(bx, by, bw, bh); ctx.strokeRect(bx, by, bw, bh); noNeon();
    ctx.fillStyle = hov ? '#d8b4fe' : '#a855f7';
    ctx.font = `${hov ? 'bold ' : ''}17px monospace`;
    ctx.fillText(label, W/2, by + 26);
  });

  ctx.font = '12px monospace'; ctx.fillStyle = '#2a1a4a';
  ctx.fillText('P1: ↑ ↓   P2: W S', W/2, H - 20);
}

function drawScoreSelect() {
  drawBg();
  ctx.textAlign = 'center';
  ctx.font = 'bold 32px monospace'; ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 1.5;
  neon('#a855f7', 15); ctx.strokeText('First to...', W/2, H/2 - 110); noNeon();
  ctx.font = '13px monospace'; ctx.fillStyle = '#4b2a6b';
  ctx.fillText('or choose Endless for no win condition', W/2, H/2 - 78);

  const opts = [
    { label: '3', value: 3 },
    { label: '5', value: 5 },
    { label: '10', value: 10 },
    { label: 'Endless', value: Infinity },
  ];
  opts.forEach((opt, i) => {
    const bx = W/2 - 140, by = H/2 - 40 + i * 52, bw = 280, bh = 42;
    const hov = scoreHover === i;
    ctx.strokeStyle = hov ? '#d8b4fe' : '#7c3aed'; ctx.lineWidth = 1;
    ctx.fillStyle = hov ? '#a855f715' : 'transparent';
    neon('#a855f7', hov ? 12 : 0);
    ctx.fillRect(bx, by, bw, bh); ctx.strokeRect(bx, by, bw, bh); noNeon();
    ctx.fillStyle = hov ? '#d8b4fe' : '#a855f7';
    ctx.font = `${hov ? 'bold ' : ''}18px monospace`;
    ctx.fillText(opt.label, W/2, by + 28);
  });
}

function drawWin() {
  drawGame();
  ctx.fillStyle = '#0d0d0fbb'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 54px monospace'; ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 2;
  neon('#a855f7', 30); ctx.strokeText(`${winner} wins!`, W/2, H/2 - 30); noNeon();
  const mm = String(Math.floor(totalTime/60)).padStart(2,'0');
  const ss = String(Math.floor(totalTime%60)).padStart(2,'0');
  ctx.fillStyle = '#6b4a9b'; ctx.font = '16px monospace';
  ctx.fillText(`time: ${mm}:${ss}`, W/2, H/2 + 16);
  ctx.fillStyle = '#4b2a6b'; ctx.font = '14px monospace';
  ctx.fillText('click to return to menu', W/2, H/2 + 50);
}

// --- Interaction ---
const MENU_MODES = ['ai-easy', 'ai-medium', 'ai-hard', 'pvp'];
const SCORE_OPTS  = [3, 5, 10, Infinity];

function menuBox(i)  { return { x: W/2-160, y: H/2-55+i*52,  w: 320, h: 40 }; }
function scoreBox(i) { return { x: W/2-140, y: H/2-40+i*52,  w: 280, h: 42 }; }

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (W / r.width);
  const my = (e.clientY - r.top) * (H / r.height);
  menuHover = scoreHover = -1;
  if (state === 'menu') {
    for (let i = 0; i < 4; i++) {
      const b = menuBox(i);
      if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) { menuHover = i; break; }
    }
  } else if (state === 'score-select') {
    for (let i = 0; i < 4; i++) {
      const b = scoreBox(i);
      if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) { scoreHover = i; break; }
    }
  }
});

canvas.addEventListener('click', () => {
  initAudio();
  if (state === 'menu' && menuHover >= 0) {
    pendingMode = MENU_MODES[menuHover];
    state = 'score-select';
    scoreHover = -1;
  } else if (state === 'score-select' && scoreHover >= 0) {
    mode = pendingMode;
    targetScore = SCORE_OPTS[scoreHover];
    resetGame();
    state = 'playing';
  } else if (state === 'win') {
    state = 'menu'; menuHover = -1;
  }
});

// --- Loop ---
initBg();
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  if      (state === 'menu')         drawMenu();
  else if (state === 'score-select') drawScoreSelect();
  else if (state === 'playing')      { update(dt); drawGame(); }
  else if (state === 'win')          drawWin();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
