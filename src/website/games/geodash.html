<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoDash</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07060f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
    .back-btn {
      position: fixed;
      top: 1rem; right: 1.2rem;
      padding: 0.35rem 1rem;
      border: 1px solid #a855f7;
      color: #a855f7;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.08em;
      text-decoration: none; text-transform: uppercase;
      font-family: monospace;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .back-btn:hover { background: #a855f720; box-shadow: 0 0 10px #a855f7; }
  </style>
</head>
<body>
  <a class="back-btn" id="backBtn" href="#">Back</a>
  <canvas id="c"></canvas>

<script>
// --- Back button ---
(function() {
  const p = new URLSearchParams(window.location.search);
  document.getElementById('backBtn').href =
    p.get('from') === 'published' ? '../published.html' : '../drafts.html';
})();

// ===================== CONSTANTS =====================
const W           = 880;
const H           = 490;
const TILE        = 42;
const FLOOR_Y     = H - 90;
const GROUND_Y    = FLOOR_Y - TILE / 2;
const CUBE_X      = 180;
const CUBE_SIZE   = TILE;
const INNER_SIZE  = 17;   // visual
const INNER_HB    = 14;   // hitbox — slightly smaller than visual
const SPEED       = 230;  // world scroll px/s
const GRAVITY     = 1900;
const JUMP_VEL    = 620;
const ROT_RATE    = (Math.PI / 2) / TILE * SPEED;
const DEATH_PAUSE = 0.65;
const ROYGBIV     = ['#ff2424','#ff7700','#ffe600','#00ee44','#00bbff','#3355ff','#cc00ff'];

// ===================== CANVAS =====================
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = W;
canvas.height = H;

// ===================== STATE =====================
let worldOffset = 0;
let cubeAngle   = 0;
let cubeY       = GROUND_Y;
let cubeVY      = 0;
let grounded    = true;
let isDead      = false;
let deathTimer  = 0;
let obstacles   = [];

// ===================== STARS (fixed to screen) =====================
const STARS = Array.from({ length: 120 }, () => ({
  x: Math.random() * W,
  y: Math.random() * (FLOOR_Y - 10),
  r: Math.random() * 0.9 + 0.2,
  o: Math.random() * 0.4 + 0.1,
}));

// ===================== OBSTACLES =====================
function genObstacles() {
  const obs = [];
  let wx = TILE * (Math.ceil(W / TILE) + 5); // start off-screen right
  while (wx < 28000) {
    const color = ROYGBIV[Math.floor(Math.random() * ROYGBIV.length)];
    const roll  = Math.random();
    if (roll < 0.35) {
      // Single floor block
      obs.push({ worldX: wx, y: FLOOR_Y - TILE, color });
    } else if (roll < 0.58) {
      // Two-high stack
      obs.push({ worldX: wx, y: FLOOR_Y - TILE,     color });
      obs.push({ worldX: wx, y: FLOOR_Y - TILE * 2, color });
    } else if (roll < 0.74) {
      // Two adjacent floor blocks
      obs.push({ worldX: wx,        y: FLOOR_Y - TILE, color });
      obs.push({ worldX: wx + TILE, y: FLOOR_Y - TILE, color });
      wx += TILE;
    } else if (roll < 0.88) {
      // Floating platform (one tile up)
      obs.push({ worldX: wx, y: FLOOR_Y - TILE * 2, color });
    } else {
      // Step: floor block + floating block one tile right and one up
      obs.push({ worldX: wx,        y: FLOOR_Y - TILE,     color });
      obs.push({ worldX: wx + TILE, y: FLOOR_Y - TILE * 2, color });
      wx += TILE;
    }
    wx += TILE * (3 + Math.floor(Math.random() * 4));
  }
  return obs;
}

// ===================== HELPERS =====================
function neon(color, blur) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
function noNeon()           { ctx.shadowBlur = 0; }

// ===================== PHYSICS =====================
function jump() {
  if (!grounded || isDead) return;
  cubeVY   = -JUMP_VEL;
  grounded = false;
}

function die() {
  if (isDead) return;
  isDead    = true;
  deathTimer = DEATH_PAUSE;
}

function respawn() {
  worldOffset = 0;
  cubeY       = GROUND_Y;
  cubeVY      = 0;
  grounded    = true;
  cubeAngle   = 0;
  isDead      = false;
  deathTimer  = 0;
  obstacles   = genObstacles();
}

function resolveCollisions() {
  grounded = false;

  // Floor
  if (cubeY + CUBE_SIZE / 2 >= FLOOR_Y) {
    cubeY  = FLOOR_Y - CUBE_SIZE / 2;
    cubeVY = 0;
    grounded = true;
  }

  // Obstacle tops — land only when falling/level (cubeVY >= 0)
  if (cubeVY >= 0) {
    for (const obs of obstacles) {
      const sx = obs.worldX - worldOffset;
      if (sx + TILE <= CUBE_X - CUBE_SIZE / 2 || sx >= CUBE_X + CUBE_SIZE / 2) continue;
      // Cube bottom has reached obs top and cube top is still above obs top
      if (cubeY + CUBE_SIZE / 2 >= obs.y && cubeY - CUBE_SIZE / 2 < obs.y) {
        cubeY  = obs.y - CUBE_SIZE / 2;
        cubeVY = 0;
        grounded = true;
      }
    }
  }
}

function checkDeath() {
  if (isDead) return;
  const hb = INNER_HB / 2;
  const il = CUBE_X - hb, ir = CUBE_X + hb;
  const it = cubeY   - hb, ib = cubeY   + hb;
  for (const obs of obstacles) {
    const sx = obs.worldX - worldOffset;
    if (ir > sx && il < sx + TILE && ib > obs.y && it < obs.y + TILE) {
      die(); return;
    }
  }
}

// ===================== DRAW =====================
function drawBackground() {
  ctx.fillStyle = '#07060f';
  ctx.fillRect(0, 0, W, H);

  for (const s of STARS) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(210,210,255,${s.o})`;
    ctx.fill();
  }

  const ox = worldOffset % TILE;
  ctx.strokeStyle = '#0e0720'; ctx.lineWidth = 0.5;
  for (let x = -ox; x < W; x += TILE) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, FLOOR_Y); ctx.stroke();
  }
  for (let y = 0; y < FLOOR_Y; y += TILE) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawFloor() {
  ctx.fillStyle = '#080015';
  ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);

  const ox = worldOffset % TILE;
  ctx.strokeStyle = '#160830'; ctx.lineWidth = 0.6;
  for (let x = -ox; x < W; x += TILE) {
    ctx.beginPath(); ctx.moveTo(x, FLOOR_Y); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(0, FLOOR_Y + TILE * 0.5); ctx.lineTo(W, FLOOR_Y + TILE * 0.5);
  ctx.stroke();

  neon('#a855f7', 10);
  ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, FLOOR_Y); ctx.lineTo(W, FLOOR_Y); ctx.stroke();
  noNeon();
}

function drawObstacles() {
  for (const obs of obstacles) {
    const sx = obs.worldX - worldOffset;
    if (sx + TILE < 0 || sx > W) continue;
    ctx.fillStyle = obs.color + '18';
    ctx.fillRect(sx, obs.y, TILE, TILE);
    neon(obs.color, 12);
    ctx.strokeStyle = obs.color; ctx.lineWidth = 1.5;
    ctx.strokeRect(sx, obs.y, TILE, TILE);
    noNeon();
  }
}

function drawCube() {
  ctx.save();
  ctx.translate(CUBE_X, cubeY);
  ctx.rotate(cubeAngle);

  // Outer — neon green
  neon('#39ff14', 18);
  ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 2;
  ctx.strokeRect(-CUBE_SIZE / 2, -CUBE_SIZE / 2, CUBE_SIZE, CUBE_SIZE);
  noNeon();

  // Inner — neon blue (slightly shrunk)
  neon('#00d4ff', 14);
  ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 1.5;
  ctx.strokeRect(-INNER_SIZE / 2, -INNER_SIZE / 2, INNER_SIZE, INNER_SIZE);
  noNeon();

  ctx.restore();
}

function drawDeathOverlay() {
  const t = deathTimer / DEATH_PAUSE; // 1.0 → 0.0
  const alpha = t > 0.6 ? 0.5 : t * 0.3;
  ctx.fillStyle = `rgba(255, 20, 20, ${alpha})`;
  ctx.fillRect(0, 0, W, H);
}

// ===================== INPUT =====================
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') { e.preventDefault(); jump(); }
});
canvas.addEventListener('mousedown', () => jump());

// ===================== LOOP =====================
obstacles = genObstacles();
let last = 0;

function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  if (isDead) {
    deathTimer -= dt;
    if (deathTimer <= 0) { respawn(); }
    drawBackground();
    drawFloor();
    drawObstacles();
    drawCube();
    drawDeathOverlay();
  } else {
    worldOffset += SPEED * dt;
    cubeVY      += GRAVITY * dt;
    cubeY       += cubeVY * dt;

    grounded = false;
    resolveCollisions();

    if (!grounded) {
      cubeAngle += ROT_RATE * dt;
    } else {
      cubeAngle = Math.round(cubeAngle / (Math.PI / 2)) * (Math.PI / 2);
    }

    checkDeath();

    drawBackground();
    drawFloor();
    drawObstacles();
    drawCube();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
