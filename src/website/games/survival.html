const W = 880, H = 490;

canvas.height = H;

function glow(color, blur) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
function noGlow()           { ctx.shadowBlur = 0; }

// ===================== INPUT =====================
const keys       = {};
const released   = {};
const justPressed = new Set();
const DIAG_GRACE = 50;

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (['w','a','s','d'].includes(k)) e.preventDefault();
  if (k === 'i') { inventoryOpen = !inventoryOpen; mapOpen = false; return; }
  if (k === 'm') { mapOpen = !mapOpen; inventoryOpen = false; return; }
  if (k === 'e') { justPressed.add('e'); return; }
  if (k === 'f') { justPressed.add('f'); return; }
  keys[k] = true;
  if (e.key === 'Shift') keys['shift'] = true;
  delete released[k];
});
document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  keys[k] = false;
  if (e.key === 'Shift') keys['shift'] = false;
  released[k] = performance.now();
});

function active(k) {
  return keys[k] || (released[k] !== undefined && performance.now() - released[k] < DIAG_GRACE);
}

// ===================== WORLD =====================
const CHUNK_W = W, CHUNK_H = H;
const CHUNKS_X = 8, CHUNKS_Y = 10;
const WORLD_W  = CHUNK_W * CHUNKS_X;
const WORLD_H  = CHUNK_H * CHUNKS_Y;

function chunkRNG(cx, cy) {
  let s = (cx * 73856093 ^ cy * 19349663) >>> 0;
  return function() {
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    return (s >>> 0) / 0x100000000;
  };
}

// ===================== TREE GEOMETRY =====================
const CBS   = 5;
const CRX   = 12;
const CRY   = 9;
const TW    = 14;
const TH    = 52;
const TCOL  = 20;
const SEG_H = 8;

const C_OUTER = [], C_MID = [], C_INNER = [];
for (let row = -CRY; row <= CRY; row++) {
  for (let col = -CRX; col <= CRX; col++) {
    const d2 = (col / CRX) ** 2 + (row / CRY) ** 2;
    if (d2 > 1.0) continue;
    if      (d2 > 0.65) C_OUTER.push([row, col]);
    else if (d2 > 0.28) C_MID.push([row, col]);
    else                C_INNER.push([row, col]);
  }
}

// ===================== ROCK GEOMETRY =====================
const ROCK_R      = 30;
const ROCK_COLL_R = 24;

// ===================== GRASS VARIANTS =====================
const GRASS_VARIANTS = [

    { dx: -4, w: 4, h: 10, c: '#1a3c0a' },

// ===================== WORLD GENERATION =====================
const worldChunks      = [];
const worldGroundItems = [];
const worldRocks       = [];

function generateSurfaceWorld() {
  worldChunks.length = 0; worldGroundItems.length = 0; worldRocks.length = 0;
  for (let cy = 0; cy < CHUNKS_Y; cy++) {
    for (let cx = 0; cx < CHUNKS_X; cx++) {
      const rng = chunkRNG(cx, cy);
      const wx  = cx * CHUNK_W, wy = cy * CHUNK_H;

      const grass = [];
      const n = 2 + Math.floor(rng() * 3);
      for (let i = 0; i < n; i++) {
        grass.push({
          x: wx + 30 + Math.floor(rng() * (CHUNK_W - 60)),
          y: wy + 30 + Math.floor(rng() * (CHUNK_H - 60)),
          v: Math.floor(rng() * GRASS_VARIANTS.length),
        });
      }

      let tree = null;
      if (rng() < 0.35) {
        const numSegs = Math.ceil(TH / SEG_H);
        const segs = [];
        let drift = 0;
        for (let i = 0; i < numSegs; i++) {
          drift += Math.round(rng() * 6 - 3);
          drift = Math.max(-6, Math.min(6, drift));
          segs.push(drift);
        }
        tree = {
          x: wx + 90 + Math.floor(rng() * (CHUNK_W - 180)),
          y: wy + 70 + Math.floor(rng() * (CHUNK_H - 180)),
          segs,
          chopped: false,
          chopHealth: undefined, chopsLeft: undefined,
        };
      }

      const numSticks = Math.floor(rng() * 3);
      for (let i = 0; i < numSticks; i++) {
        worldGroundItems.push({
          type: 'stick',
          x: wx + 20 + Math.floor(rng() * (CHUNK_W - 40)),
          y: wy + 20 + Math.floor(rng() * (CHUNK_H - 40)),
          pickedUp: false,
        });
      }

      if (rng() < 0.25) {
        worldRocks.push({
          x: wx + 80 + Math.floor(rng() * (CHUNK_W - 160)),
          y: wy + 60 + Math.floor(rng() * (CHUNK_H - 160)),
          mined: false,
          mineHealth: undefined, hitsLeft: undefined,
        });
      }

      const numSmallRocks = Math.floor(rng() * 3);
      for (let i = 0; i < numSmallRocks; i++) {
        worldGroundItems.push({
          type: 'rock',
          x: wx + 20 + Math.floor(rng() * (CHUNK_W - 40)),
          y: wy + 20 + Math.floor(rng() * (CHUNK_H - 40)),
          pickedUp: false,
        });
      }

      worldChunks.push({ grass, tree });
    }
  }
}
generateSurfaceWorld();

// ===================== CAVE WORLD =====================
const CAVE_CHUNKS = 8;
const CAVE_W = CHUNK_W * CAVE_CHUNKS;
const CAVE_H = CHUNK_H * CAVE_CHUNKS;
const caveRocks       = [];
const caveGroundItems = [];

function generateCaveWorld() {
  caveRocks.length = 0; caveGroundItems.length = 0;

for (let cy = 0; cy < CAVE_CHUNKS; cy++) {
  for (let cx = 0; cx < CAVE_CHUNKS; cx++) {
    const rng = chunkRNG(cx + 500, cy + 500); // offset seed from surface
    const wx  = cx * CHUNK_W, wy = cy * CHUNK_H;
    const numBig = 2 + Math.floor(rng() * 4);
    for (let i = 0; i < numBig; i++) {
        const rv = rng();
      const oreType = rv < 0.22 ? 'coal' : rv < 0.38 ? 'bronze' : 'rock';
      caveRocks.push({
        x: wx + 80 + Math.floor(rng() * (CHUNK_W - 160)),
        y: wy + 60 + Math.floor(rng() * (CHUNK_H - 160)),
        type: oreType,
        mined: false, mineHealth: undefined, hitsLeft: undefined,
      });
    }
    const numSmall = 1 + Math.floor(rng() * 4);
    for (let i = 0; i < numSmall; i++) {
      caveGroundItems.push({
        type: 'rock',
        x: wx + 20 + Math.floor(rng() * (CHUNK_W - 40)),
        y: wy + 20 + Math.floor(rng() * (CHUNK_H - 40)),
        pickedUp: false,
      });
    }
    // Rare loose coal nugget (~15% per chunk)
    if (rng() < 0.15) {
      caveGroundItems.push({
        type: 'coal',
        x: wx + 20 + Math.floor(rng() * (CHUNK_W - 40)),
        y: wy + 20 + Math.floor(rng() * (CHUNK_H - 40)),
        pickedUp: false,
      });
    }
    // Super rare loose copper nugget (~4% per chunk)
    if (rng() < 0.04) {
      caveGroundItems.push({
        type: 'copper',
        x: wx + 20 + Math.floor(rng() * (CHUNK_W - 40)),
        y: wy + 20 + Math.floor(rng() * (CHUNK_H - 40)),
        pickedUp: false,
      });
    }
  }
}
}
generateCaveWorld();

// ===================== CAVE STATE =====================
let inCave = false;
const mineExits = [];
let surfacePx = 0, surfacePy = 0;

function curRocks()  { return inCave ? caveRocks  : worldRocks; }
function curGround() { return inCave ? caveGroundItems : worldGroundItems; }
function curWorldW() { return inCave ? CAVE_W : WORLD_W; }
function curWorldH() { return inCave ? CAVE_H : WORLD_H; }

function enterCave(entranceIdx) {
  const ent = mineEntrances[entranceIdx];
  inCave = true;
  if (ent.caveExitIdx === undefined) {
    ent.caveExitIdx = mineExits.length;
    mineExits.push({ x: ent.x, y: ent.y, entranceIdx });
  }
  px = mineExits[ent.caveExitIdx].x;
  py = mineExits[ent.caveExitIdx].y;
  mobs.length = 0;
}

function exitCave(exitIdx) {
  const exit = mineExits[exitIdx];
  inCave = false;
  mobs.length = 0;
  px = mineEntrances[exit.entranceIdx].x;
  py = mineEntrances[exit.entranceIdx].y;
}

let gameNow = 0; // updated each frame, used by sapling grow check
const saplings = []; // { x, y, plantedTime }

const craftingStations = [];
const mineEntrances = [];
const furnaces = [];
const torches  = [];
const STATION_RANGE = 110;
const FURNACE_RANGE = 110;

function nearFurnace() {
  return furnaces.some(f => f.cave === inCave && Math.sqrt((f.x-px)**2 + (f.y-py)**2) < FURNACE_RANGE);
}

const mobs = [];

function trunkRect(t) {
  const trunkBot = t.y + CRY * CBS + TH;
  return { x1: t.x - TW/2, x2: t.x + TW/2, y1: trunkBot - TCOL, y2: trunkBot };

// ===================== INVENTORY + CRAFTING + EQUIP =====================
let inventoryOpen = false;
const INV_COLS  = 4, INV_ROWS = 6;
const SLOT_SIZE = 52, SLOT_GAP = 6;
const INV_PAD   = 22;
const CRAFT_W   = 140;
const CRAFT_GAP = 16;
const EQUIP_W        = 100;  // slot(52) + gap(5) + label(43)
const EQUIP_GAP      = 16;
const EQUIP_COL2_GAP = 10;
const RECIPE_H  = 76;

const GRID_W = INV_COLS * SLOT_SIZE + (INV_COLS - 1) * SLOT_GAP;
const GRID_H = INV_ROWS * SLOT_SIZE + (INV_ROWS - 1) * SLOT_GAP;
const INV_W  = INV_PAD + CRAFT_W + CRAFT_GAP + GRID_W + EQUIP_GAP + EQUIP_W + EQUIP_COL2_GAP + EQUIP_W + INV_PAD;
const INV_H  = GRID_H + INV_PAD * 2 + 28;
const INV_X  = Math.round((W - INV_W) / 2);
const INV_Y  = Math.round((H - INV_H) / 2);

const CRAFT_LEFT  = INV_X + INV_PAD;
const CRAFT_TOP   = INV_Y + INV_PAD + 28;
const GRID_LEFT   = CRAFT_LEFT + CRAFT_W + CRAFT_GAP;
const GRID_TOP    = CRAFT_TOP;
const EQUIP_LEFT  = GRID_LEFT + GRID_W + EQUIP_GAP;
const EQUIP2_LEFT = EQUIP_LEFT + EQUIP_W + EQUIP_COL2_GAP;
const EQUIP_TOP   = GRID_TOP;

const inventorySlots = new Array(INV_COLS * INV_ROWS).fill(null);

const EQUIP_SLOT_DEFS = [
  { name: 'weapon',       label: 'WEAPON',  col: 0 },
  { name: 'shield',       label: 'SHIELD',  col: 0 },
  { name: 'helmet',       label: 'HELMET',  col: 0 },
  { name: 'chestplate',   label: 'CHEST',   col: 0 },
  { name: 'pants',        label: 'PANTS',   col: 0 },
  { name: 'food',         label: 'FOOD',    col: 0 },
  { name: 'hatchet_slot', label: 'HATCHET', col: 1 },
  { name: 'pickaxe_slot', label: 'PICKAXE', col: 1 },
  { name: 'furniture',    label: 'PLACE',   col: 1 },
];
const equipSlots = {};
for (const d of EQUIP_SLOT_DEFS) equipSlots[d.name] = null;

let heldSlot = null; // { type:'inv', idx:N } | { type:'equip', name:'...' } | null
let mapOpen = false;
let mouseX = W / 2, mouseY = H / 2;
let craftScrollY = 0;

function getSlotItem(slot) {
  if (!slot) return null;
  return slot.type === 'inv' ? inventorySlots[slot.idx] : equipSlots[slot.name];
}
function setSlotItem(slot, item) {
  if (slot.type === 'inv') inventorySlots[slot.idx] = item;
  else equipSlots[slot.name] = item;
}
function slotsEqual(a, b) {
  if (!a || !b || a.type !== b.type) return false;
  return a.type === 'inv' ? a.idx === b.idx : a.name === b.name;
}

let _dragStartX = 0, _dragStartY = 0, _dragActive = false, _dragMoved = false;

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
  if (_dragActive && (Math.abs(mouseX - _dragStartX) > 5 || Math.abs(mouseY - _dragStartY) > 5))
    _dragMoved = true;
});
canvas.addEventListener('mousedown', e => {
  if (!inventoryOpen) return;
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  _dragStartX = mx; _dragStartY = my; _dragMoved = false; _dragActive = false;
  if (heldSlot) return; // already holding via click-mode — don't intercept
  const slot = getSlotAtPos(mx, my);
  if (slot && getSlotItem(slot)) { heldSlot = slot; _dragActive = true; }
});
canvas.addEventListener('mouseup', e => {
  if (!_dragActive) return;
  _dragActive = false;
  if (!_dragMoved) { heldSlot = null; return; } // tiny movement = not a drag; let click handle it
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const slot = getSlotAtPos(mx, my);
  if (slot) handleSlotInteract(slot); else heldSlot = null;
  // leave _dragMoved = true so the click event (which fires after mouseup) suppresses itself
});
canvas.addEventListener('click', e => {
  if (_dragMoved) { _dragMoved = false; return; } // was a drag, already handled
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  if (inventoryOpen) { handleInventoryClick(mx, my); return; }
  handleAttackClick(mx, my);
});

canvas.addEventListener('wheel', e => {
  if (!inventoryOpen) return;
  if (mouseX >= CRAFT_LEFT && mouseX < CRAFT_LEFT + CRAFT_W) {
    const totalH = RECIPES.length * (RECIPE_H + 8) - 8;
    const maxScroll = Math.max(0, totalH - GRID_H);
    craftScrollY = Math.max(0, Math.min(maxScroll, craftScrollY + e.deltaY * 0.5));
    e.preventDefault();
  }
}, { passive: false });

function nearCraftingStation() {
  return craftingStations.some(s => {
    if (s.cave !== inCave) return false;
    const dx = s.x - px, dy = s.y - py;
    return Math.sqrt(dx*dx + dy*dy) < STATION_RANGE;
  });
}

function countItem(id) {
  let n = 0;
  for (const slot of inventorySlots) if (slot && slot.id === id) n += slot.count;
  return n;
}

function consumeItem(id, need) {
  for (let i = 0; i < inventorySlots.length && need > 0; i++) {
    if (inventorySlots[i] && inventorySlots[i].id === id) {
      const take = Math.min(need, inventorySlots[i].count);
      inventorySlots[i].count -= take; need -= take;
      if (inventorySlots[i].count === 0) inventorySlots[i] = null;
    }
  }
}

function canCraft(recipe) {
  if (recipe.requiresStation && !nearCraftingStation()) return false;
  if (recipe.requiresFurnace && !nearFurnace()) return false;
  for (const ing of recipe.ingredients)
    if (countItem(ing.id) < ing.count) return false;
  if (recipe.fuelOptions) {
    const ok = recipe.fuelOptions.some(fuel => fuel.every(ing => countItem(ing.id) >= ing.count));
    if (!ok) return false;
  }
  return true;
}

function craft(recipe) {
  if (!canCraft(recipe)) return;
  for (const ing of recipe.ingredients) consumeItem(ing.id, ing.count);
  if (recipe.fuelOptions) {
    const fuel = recipe.fuelOptions.find(fuel => fuel.every(ing => countItem(ing.id) >= ing.count));
    if (fuel) for (const ing of fuel) consumeItem(ing.id, ing.count);
  }
  const n = recipe.yield || 1;
  for (let i = 0; i < n; i++) addToInventory(recipe.id);
}

// Which equip slot each item belongs to (items not listed can only go in inventory)
const ITEM_SLOT = {
  sword: 'weapon', bronze_sword: 'weapon',
  hatchet: 'hatchet_slot', bronze_hatchet: 'hatchet_slot',
  pickaxe: 'pickaxe_slot', bronze_pickaxe: 'pickaxe_slot',
  campfire: 'furniture', crafting_station: 'furniture', mine_entrance: 'furniture',
  furnace: 'furniture', sapling: 'furniture', torch: 'furniture',
  feather_hat: 'helmet', feather_pants: 'pants',
  bone_armor: 'chestplate',
  raw_chicken: 'food', cooked_chicken: 'food',
};

function canPlaceInSlot(item, slot) {
  if (!item) return true;
  if (slot.type === 'inv') return true; // anything goes in inventory
  const required = ITEM_SLOT[item.id];
  if (!required) return false; // non-equippable items can't go in equip slots
  return required === slot.name;
}

function handleSlotInteract(slot) {
  if (!heldSlot) {
    if (getSlotItem(slot)) heldSlot = slot;
  } else if (slotsEqual(heldSlot, slot)) {
    heldSlot = null;
  } else {
    const a = getSlotItem(heldSlot);
    const b = getSlotItem(slot);
    if (!canPlaceInSlot(a, slot) || !canPlaceInSlot(b, heldSlot)) {
      heldSlot = null; return;
    }
    setSlotItem(slot, a);
    setSlotItem(heldSlot, b);
    heldSlot = null;
  }
}

function getSlotAtPos(mx, my) {
  for (let row = 0; row < INV_ROWS; row++) {
    for (let col = 0; col < INV_COLS; col++) {
      const sx = GRID_LEFT + col * (SLOT_SIZE + SLOT_GAP);
      const sy = GRID_TOP  + row * (SLOT_SIZE + SLOT_GAP);
      if (mx >= sx && mx < sx + SLOT_SIZE && my >= sy && my < sy + SLOT_SIZE)
        return { type: 'inv', idx: row * INV_COLS + col };
    }
  }
  const _col0 = EQUIP_SLOT_DEFS.filter(d => d.col === 0);
  const _col1 = EQUIP_SLOT_DEFS.filter(d => d.col === 1);
  for (const def of EQUIP_SLOT_DEFS) {
    const colArr = def.col === 0 ? _col0 : _col1;
    const row = colArr.indexOf(def);
    const sx = def.col === 0 ? EQUIP_LEFT : EQUIP2_LEFT;
    const sy = EQUIP_TOP + row * (SLOT_SIZE + SLOT_GAP);
    if (mx >= sx && mx < sx + SLOT_SIZE && my >= sy && my < sy + SLOT_SIZE)
      return { type: 'equip', name: def.name };
  }
  return null;
}

function handleInventoryClick(mx, my) {
  const slot = getSlotAtPos(mx, my);
  if (slot) { handleSlotInteract(slot); return; }
  // Craft buttons (account for scroll, only hit if inside clip area)
  for (let ri = 0; ri < RECIPES.length; ri++) {
    const ry   = CRAFT_TOP + ri * (RECIPE_H + 8) - craftScrollY;
    if (ry + RECIPE_H < CRAFT_TOP || ry > CRAFT_TOP + GRID_H) continue;
    const btnX = CRAFT_LEFT + CRAFT_W - 50;
    const btnY = ry + RECIPE_H - 22;
    if (mx >= btnX && mx < btnX + 48 && my >= btnY && my < btnY + 18 &&
        my >= CRAFT_TOP && my < CRAFT_TOP + GRID_H) {
      if (canCraft(RECIPES[ri])) craft(RECIPES[ri]);
      heldSlot = null; return;
    }
  }
  heldSlot = null;
}

function drawInventory() {
  ctx.fillStyle = 'rgba(4, 3, 12, 0.82)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#0a0718';
  ctx.fillRect(INV_X, INV_Y, INV_W, INV_H);

  glow('#a855f7', 14);
  ctx.strokeStyle = '#7c3aed'; ctx.lineWidth = 1.5;
  ctx.strokeRect(INV_X, INV_Y, INV_W, INV_H);
  noGlow();

  // Dividers
  ctx.strokeStyle = '#2a1050'; ctx.lineWidth = 1;
  const div1X = CRAFT_LEFT + CRAFT_W + CRAFT_GAP / 2;
  const div2X = EQUIP_LEFT - EQUIP_GAP / 2;
  for (const dx of [div1X, div2X]) {
    ctx.beginPath(); ctx.moveTo(dx, INV_Y + 12); ctx.lineTo(dx, INV_Y + INV_H - 12); ctx.stroke();
  }

  // ---- CRAFTING PANEL ----
  ctx.fillStyle = '#a855f7';
  ctx.font = '600 10px monospace';
  ctx.letterSpacing = '0.12em';
  ctx.fillText('CRAFTING', CRAFT_LEFT, INV_Y + INV_PAD + 10);
  ctx.letterSpacing = '0';

  ctx.save();
  ctx.beginPath();
  ctx.rect(CRAFT_LEFT, CRAFT_TOP, CRAFT_W, GRID_H);
  ctx.clip();

  for (let ri = 0; ri < RECIPES.length; ri++) {
    const recipe   = RECIPES[ri];
    const ok       = canCraft(recipe);
    const ry       = CRAFT_TOP + ri * (RECIPE_H + 8) - craftScrollY;
    if (ry + RECIPE_H < CRAFT_TOP || ry > CRAFT_TOP + GRID_H) continue;

    ctx.fillStyle = ok ? '#0e1c08' : '#0d0a1c';
    ctx.fillRect(CRAFT_LEFT, ry, CRAFT_W, RECIPE_H);
    ctx.strokeStyle = ok ? '#2e5818' : '#1e1240'; ctx.lineWidth = 1;
    ctx.strokeRect(CRAFT_LEFT, ry, CRAFT_W, RECIPE_H);

    drawItemIcon(recipe.id, CRAFT_LEFT + 16, ry + 22, 22);

    ctx.fillStyle = ok ? '#96d048' : '#5a4870';
    ctx.font = '700 10px monospace';
    const nameLabel = recipe.yield > 1 ? `${recipe.name.toUpperCase()} x${recipe.yield}` : recipe.name.toUpperCase();
    ctx.fillText(nameLabel, CRAFT_LEFT + 32, ry + 16);
    if (recipe.requiresStation && !nearCraftingStation()) {
      ctx.fillStyle = '#a06030'; ctx.font = '500 7px monospace';
      ctx.fillText('req. station', CRAFT_LEFT + 32, ry + 26);
    }
    if (recipe.requiresFurnace && !nearFurnace()) {
      ctx.fillStyle = '#c05820'; ctx.font = '500 7px monospace';
      ctx.fillText('req. furnace', CRAFT_LEFT + 32, ry + 26);
    }

    for (let ii = 0; ii < recipe.ingredients.length; ii++) {
      const ing = recipe.ingredients[ii];
      const iy  = ry + 30 + ii * 14;
      drawItemIcon(ing.id, CRAFT_LEFT + 38, iy, 11);
      ctx.fillStyle = ok ? '#7a9a50' : '#4a3a60';
      ctx.font = '500 8px monospace';
      ctx.fillText(`${ing.count}x ${ing.id}`, CRAFT_LEFT + 46, iy + 4);
    }
    if (recipe.fuelOptions) {
      const iy = ry + 30 + recipe.ingredients.length * 14;
      const fuelStr = recipe.fuelOptions.map(f => f.map(i => `${i.count}x ${i.id}`).join('+')).join(' or ');
      ctx.fillStyle = ok ? '#7a9a50' : '#4a3a60';
      ctx.font = '500 7px monospace';
      ctx.fillText(fuelStr, CRAFT_LEFT + 30, iy + 4);
    }

    const btnX = CRAFT_LEFT + CRAFT_W - 50, btnY = ry + RECIPE_H - 22;
    ctx.fillStyle = ok ? '#162e0a' : '#120e22';
    ctx.fillRect(btnX, btnY, 48, 18);
    if (ok) { glow('#5aaa28', 6); ctx.strokeStyle = '#5aaa28'; }
    else      ctx.strokeStyle = '#2a1a4a';
    ctx.lineWidth = 1; ctx.strokeRect(btnX, btnY, 48, 18); noGlow();
    ctx.fillStyle = ok ? '#90d040' : '#3a2a58';
    ctx.font = '700 8px monospace'; ctx.letterSpacing = '0.1em';
    ctx.textAlign = 'center';
    ctx.fillText('CRAFT', btnX + 24, btnY + 12);
    ctx.textAlign = 'left'; ctx.letterSpacing = '0';
  }

  // Scroll indicator
  const totalCraftH = RECIPES.length * (RECIPE_H + 8) - 8;
  if (totalCraftH > GRID_H) {
    const trackH = GRID_H, thumbH = Math.max(20, (GRID_H / totalCraftH) * trackH);
    const thumbY = CRAFT_TOP + (craftScrollY / (totalCraftH - GRID_H)) * (trackH - thumbH);
    ctx.fillStyle = '#1a0a30'; ctx.fillRect(CRAFT_LEFT + CRAFT_W - 5, CRAFT_TOP, 4, trackH);
    ctx.fillStyle = '#5a3a80'; ctx.fillRect(CRAFT_LEFT + CRAFT_W - 5, thumbY, 4, thumbH);
  }
  ctx.restore();

  // ---- INVENTORY GRID ----
  ctx.fillStyle = '#a855f7';
  ctx.font = '600 11px monospace'; ctx.letterSpacing = '0.12em';
  ctx.fillText('INVENTORY', GRID_LEFT, INV_Y + INV_PAD + 10);
  ctx.letterSpacing = '0';

  for (let row = 0; row < INV_ROWS; row++) {
    for (let col = 0; col < INV_COLS; col++) {
      const sx   = GRID_LEFT + col * (SLOT_SIZE + SLOT_GAP);
      const sy   = GRID_TOP  + row * (SLOT_SIZE + SLOT_GAP);
      const idx  = row * INV_COLS + col;
      const item = inventorySlots[idx];
      const slot = { type: 'inv', idx };
      const isH  = slotsEqual(heldSlot, slot);

      ctx.fillStyle = isH ? '#1e0e32' : '#0d0a1e';
      ctx.fillRect(sx, sy, SLOT_SIZE, SLOT_SIZE);
      if (isH) { glow('#c084fc', 8); ctx.strokeStyle = '#c084fc'; }
      else       ctx.strokeStyle = '#2a1050';
      ctx.lineWidth = isH ? 1.5 : 1;
      ctx.strokeRect(sx, sy, SLOT_SIZE, SLOT_SIZE);
      noGlow();

      if (item) {
        if (isH) ctx.globalAlpha = 0.35;
        drawItemIcon(item.id, sx + SLOT_SIZE/2, sy + SLOT_SIZE/2, 28);
        ctx.globalAlpha = 1;
        if (item.count > 1) {
          ctx.fillStyle = '#a78bfa'; ctx.font = '500 9px monospace';
          ctx.textAlign = 'right';
          ctx.fillText(item.count, sx + SLOT_SIZE - 4, sy + SLOT_SIZE - 4);
          ctx.textAlign = 'left';
        }
      }
    }
  }

  // ---- EQUIP PANEL ----
  ctx.font = '600 10px monospace'; ctx.letterSpacing = '0.12em';
  ctx.fillStyle = '#a855f7';
  ctx.fillText('EQUIP', EQUIP_LEFT, INV_Y + INV_PAD + 10);
  ctx.fillText('TOOLS', EQUIP2_LEFT, INV_Y + INV_PAD + 10);
  ctx.letterSpacing = '0';

  const _eCol0 = EQUIP_SLOT_DEFS.filter(d => d.col === 0);
  const _eCol1 = EQUIP_SLOT_DEFS.filter(d => d.col === 1);
  for (const def of EQUIP_SLOT_DEFS) {
    const colArr = def.col === 0 ? _eCol0 : _eCol1;
    const row  = colArr.indexOf(def);
    const sx   = def.col === 0 ? EQUIP_LEFT : EQUIP2_LEFT;
    const sy   = EQUIP_TOP + row * (SLOT_SIZE + SLOT_GAP);
    const slot = { type: 'equip', name: def.name };
    const item = equipSlots[def.name];
    const isH  = slotsEqual(heldSlot, slot);
    const isActive = item && ['weapon','hatchet_slot','pickaxe_slot','furniture'].includes(def.name);

    ctx.fillStyle = isH ? '#1e0e32' : '#0d0a1e';
    ctx.fillRect(sx, sy, SLOT_SIZE, SLOT_SIZE);

    if (isH)       { glow('#c084fc', 8); ctx.strokeStyle = '#c084fc'; }
    else if (isActive) { glow('#c09030', 6); ctx.strokeStyle = '#8a6020'; }
    else if (item) { ctx.strokeStyle = '#3a2060'; }
    else           { ctx.strokeStyle = '#1a0e30'; }
    ctx.lineWidth = isH ? 1.5 : 1;
    ctx.strokeRect(sx, sy, SLOT_SIZE, SLOT_SIZE);
    noGlow();

    if (item) {
      if (isH) ctx.globalAlpha = 0.35;
      drawItemIcon(item.id, sx + SLOT_SIZE/2, sy + SLOT_SIZE/2, 28);
      ctx.globalAlpha = 1;
    }

    ctx.fillStyle = item ? '#7a5a9a' : '#3a2a50';
    ctx.font = '500 8px monospace';
    ctx.fillText(def.label, sx + SLOT_SIZE + 5, sy + SLOT_SIZE/2 + 3);
  }

  // Held item follows cursor
  const heldItem = getSlotItem(heldSlot);
  if (heldItem) {
    ctx.globalAlpha = 0.85;
    drawItemIcon(heldItem.id, mouseX, mouseY, 30);
    ctx.globalAlpha = 1;
  }
}

// ===================== PLAYER =====================
const BODY_R      = 18;
const HEAD_R      = 7;
const HEAD_DIST   = 12;
const SPEED       = 160;
const SPRINT_MULT = 1.75;

let px = WORLD_W / 2, py = WORLD_H / 2;
let facingAngle = -Math.PI / 2;
let nearbyItem        = null;
let nearbyChopTarget  = null;
let nearbyMineTarget  = null;

// ===================== STAMINA =====================
const STAM_MAX         = 100;
const STAM_DRAIN       = 40;
const STAM_REGEN       = 25;
const STAM_REGEN_DELAY = 3;

let stamina      = STAM_MAX;
let staminaReady = false;
let walkingTimer = 0;

// ===================== PARTICLES =====================
const particles = [];

function spawnParticles(wx, wy, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 45 + Math.random() * 90;
    particles.push({
      wx, wy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r:  2 + Math.random() * 2.5,
      color,
      life:  1.0,
      decay: 1.4 + Math.random() * 1.2,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.wx += p.vx * dt; p.wy += p.vy * dt;
    p.vx *= 0.88;      p.vy *= 0.88;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const sx = p.wx - camX, sy = p.wy - camY;
    if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) continue;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(sx - p.r/2, sy - p.r/2, p.r, p.r);
  }
  ctx.globalAlpha = 1;
}

// ===================== DAY/NIGHT CYCLE =====================
const DAY_DUR   = 45;
const NIGHT_DUR = 30;
const TRANS_DUR = 5;
const CYCLE_LEN = DAY_DUR + TRANS_DUR + NIGHT_DUR + TRANS_DUR; // 70s
let cycleTime = 0;
let darkAlpha  = 0;
let gameTime   = 0; // total elapsed, not modulo — used for day count

function getCurrentDay() { return Math.floor(gameTime / CYCLE_LEN) + 1; }

const lightCanvas = document.createElement('canvas');
lightCanvas.width = W; lightCanvas.height = H;
const lctx = lightCanvas.getContext('2d');

function updateDayNight(dt) {
  gameTime += dt;
  cycleTime = gameTime % CYCLE_LEN;
  if      (cycleTime < DAY_DUR)                                darkAlpha = 0;
  else if (cycleTime < DAY_DUR + TRANS_DUR)                    darkAlpha = (cycleTime - DAY_DUR) / TRANS_DUR;
  else if (cycleTime < DAY_DUR + TRANS_DUR + NIGHT_DUR)        darkAlpha = 1;
  else                                                         darkAlpha = 1 - (cycleTime - DAY_DUR - TRANS_DUR - NIGHT_DUR) / TRANS_DUR;
}

// ===================== CAMERA =====================
let camX = 0, camY = 0;

function updateCamera() {
  camX = Math.max(0, Math.min(curWorldW() - W, px - W / 2));
  camY = Math.max(0, Math.min(curWorldH() - H, py - H / 2));
}

// ===================== UPDATE =====================
function updateFacing() {
  const dx = (active('d') ? 1 : 0) - (active('a') ? 1 : 0);
  const dy = (active('s') ? 1 : 0) - (active('w') ? 1 : 0);
  if (dx !== 0 || dy !== 0) facingAngle = Math.atan2(dy, dx);
}

function resolveTreeCollisions() {
  if (inCave) return;
  for (const chunk of worldChunks) {
    if (!chunk.tree || chunk.tree.chopped) continue;
    const r  = trunkRect(chunk.tree);
    const cx = Math.max(r.x1, Math.min(r.x2, px));
    const cy = Math.max(r.y1, Math.min(r.y2, py));
    const dx = px - cx, dy = py - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < BODY_R) {
      if (dist === 0) py = r.y1 - BODY_R;
      else { const ov = BODY_R - dist; px += (dx/dist)*ov; py += (dy/dist)*ov; }
    }
  }
}

function resolveRockCollisions() {
  for (const rock of curRocks()) {
    if (rock.mined) continue;
    const dx   = px - rock.x, dy = py - rock.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const min  = BODY_R + ROCK_COLL_R;
    if (dist < min && dist > 0) {
      const ov = min - dist;
      px += (dx/dist)*ov; py += (dy/dist)*ov;
    }
  }
}

// ===================== INTERACT =====================
const PICKUP_RANGE = 65;
const CHOP_RANGE   = 90;
const MINE_RANGE   = 75;
const FACING_DOT   = 0.45;

function getNearbyInteractable() {
  let best = null, bestDist = Infinity;
  const fx = Math.cos(facingAngle), fy = Math.sin(facingAngle);
  for (const item of curGround()) {
    if (item.pickedUp) continue;
    const dx = item.x - px, dy = item.y - py;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > PICKUP_RANGE || dist === 0) continue;
    if (fx*(dx/dist) + fy*(dy/dist) < FACING_DOT) continue;
    if (dist < bestDist) { bestDist = dist; best = item; }
  }
  return best;
}

function getNearbyChopTarget() {
  const weapon = equipSlots['hatchet_slot'];
  if (!weapon || !['hatchet','bronze_hatchet'].includes(weapon.id)) return null;
  let best = null, bestDist = Infinity;
  const fx = Math.cos(facingAngle), fy = Math.sin(facingAngle);
  for (const chunk of worldChunks) {
    if (!chunk.tree || chunk.tree.chopped) continue;
    const t  = chunk.tree;
    const ty = t.y + CRY * CBS + TH * 0.6;
    const dx = t.x - px, dy = ty - py;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > CHOP_RANGE || dist === 0) continue;
    if (fx*(dx/dist) + fy*(dy/dist) < FACING_DOT) continue;
    if (dist < bestDist) { bestDist = dist; best = t; }
  }
  return best;
}

function getNearbyMineTarget() {
  const weapon = equipSlots['pickaxe_slot'];
  if (!weapon || !['pickaxe','bronze_pickaxe'].includes(weapon.id)) return null;
  let best = null, bestDist = Infinity;
  const fx = Math.cos(facingAngle), fy = Math.sin(facingAngle);
  for (const rock of curRocks()) {
    if (rock.mined) continue;
    const dx = rock.x - px, dy = rock.y - py;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > MINE_RANGE || dist === 0) continue;
    if (fx*(dx/dist) + fy*(dy/dist) < FACING_DOT) continue;
    if (dist < bestDist) { bestDist = dist; best = rock; }
  }
  return best;
}

function addToInventory(id) {
  for (let i = 0; i < inventorySlots.length; i++) {
    if (inventorySlots[i] && inventorySlots[i].id === id && inventorySlots[i].count < 99) {
      inventorySlots[i].count++; return;
    }
  }
  for (let i = 0; i < inventorySlots.length; i++) {
    if (!inventorySlots[i]) { inventorySlots[i] = { id, count: 1 }; return; }
  }
}

function chopTree(tree, power) {
  power = power || 1;
  if (tree.chopHealth === undefined) {
    tree.chopHealth = 4 + Math.floor(Math.random() * 3);
    tree.chopsLeft  = tree.chopHealth;
  }
  tree.chopsLeft -= power;

  const wx = tree.x, wy = tree.y + CRY * CBS + TH * 0.6;
  spawnParticles(wx, wy, '#5c2a0a', 4);
  spawnParticles(wx, wy, '#4a8a1c', 5);
  spawnParticles(wx, wy, '#7a4215', 2);

  if (tree.chopsLeft <= 0) {
    tree.chopped = true;
    score += 20;
    const dropY  = tree.y + CRY * CBS + TH;
    const numDrop = 7 + Math.floor(Math.random() * 4);
    for (let i = 0; i < numDrop; i++) {
      const a = Math.random() * Math.PI * 2, d = 20 + Math.random() * 55;
      worldGroundItems.push({ type: 'stick', x: tree.x + Math.cos(a)*d, y: dropY + Math.sin(a)*d, pickedUp: false });
    }
    const saplingCount = 1 + (Math.random() < 0.5 ? 1 : 0);
    for (let i = 0; i < saplingCount; i++) {
      const a = Math.random() * Math.PI * 2, d = 25 + Math.random() * 40;
      worldGroundItems.push({ type: 'sapling', x: tree.x + Math.cos(a)*d, y: dropY + Math.sin(a)*d, pickedUp: false });
    }
    spawnParticles(wx, dropY, '#4a8a1c', 18);
    spawnParticles(wx, dropY, '#5c2a0a', 10);
    spawnParticles(wx, dropY, '#3a7018', 10);
  }
}

function mineRock(rock, power) {
  power = power || 1;
  if (rock.mineHealth === undefined) {
    rock.mineHealth = 5 + Math.floor(Math.random() * 3);
    rock.hitsLeft   = rock.mineHealth;
  }
  rock.hitsLeft -= power;

  const pc1 = rock.type === 'coal' ? '#383838' : rock.type === 'bronze' ? '#c07030' : '#909090';
  const pc2 = rock.type === 'coal' ? '#1a1a1a' : rock.type === 'bronze' ? '#8a4818' : '#555555';
  spawnParticles(rock.x, rock.y, pc1, 4);
  spawnParticles(rock.x, rock.y, pc2, 3);

  if (rock.hitsLeft <= 0) {
    rock.mined = true; rock.minedTime = gameNow;
    const isCoal = rock.type === 'coal';
    const isBronze = rock.type === 'bronze';
    score += isCoal ? 30 : isBronze ? 45 : 40;
    const dropType = isCoal ? 'coal' : isBronze ? 'rough_bronze' : 'rock';
    const numDrop = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < numDrop; i++) {
      const a = Math.random() * Math.PI * 2, d = 15 + Math.random() * 38;
      curGround().push({ type: dropType, x: rock.x + Math.cos(a)*d, y: rock.y + Math.sin(a)*d, pickedUp: false });
    }
    spawnParticles(rock.x, rock.y, isBronze ? '#c07030' : isCoal ? '#2a2a2a' : '#7a7a7a', 20);
    spawnParticles(rock.x, rock.y, isBronze ? '#8a4010' : isCoal ? '#101010' : '#484848', 12);
  }
}

function handleInteract() {
  if (!justPressed.has('e')) return;
  justPressed.delete('e');
  if (inventoryOpen) return;
  // Cave exit
  if (inCave) {
    for (let i = 0; i < mineExits.length; i++) {
      const exit = mineExits[i];
      const dx = exit.x - px, dy = exit.y - py;
      if (Math.sqrt(dx*dx + dy*dy) < 70) { exitCave(i); return; }
    }
  }
  // Place items from furniture slot
  const weapon = equipSlots['furniture'];
  if (weapon && ['campfire', 'crafting_station', 'mine_entrance', 'furnace', 'sapling', 'torch'].includes(weapon.id)) {
    if (weapon.id === 'campfire') campfires.push({ x: px, y: py, cave: inCave });
    else if (weapon.id === 'crafting_station') craftingStations.push({ x: px, y: py, cave: inCave });
    else if (weapon.id === 'furnace') furnaces.push({ x: px, y: py, cave: inCave });
    else if (weapon.id === 'sapling') saplings.push({ x: px, y: py, plantedTime: gameNow });
    else if (weapon.id === 'torch') torches.push({ x: px, y: py, cave: inCave });
    else mineEntrances.push({ x: px, y: py });
    weapon.count--;
    if (weapon.count <= 0) equipSlots['furniture'] = null;
    return;
  }
  // Enter mine entrance
  if (!inCave) {
    for (let i = 0; i < mineEntrances.length; i++) {
      const me = mineEntrances[i];
      const dx = me.x - px, dy = me.y - py;
      if (Math.sqrt(dx*dx + dy*dy) < 70) { enterCave(i); return; }
    }
  }
  if (nearbyItem) {
    nearbyItem.pickedUp = true;
    addToInventory(nearbyItem.type);
    if (nearbyItem.type === 'stick') score += 5;
    else if (nearbyItem.type === 'rock') score += 10;
    else if (nearbyItem.type === 'coal') score += 15;
    return;
  }
}

function handleEat() {
  if (!justPressed.has('f')) return;
  justPressed.delete('f');
  if (inventoryOpen || mapOpen || gameOver) return;
  const food = equipSlots['food'];
  if (!food) return;
  if (food.id === 'cooked_chicken') {
    playerHp = Math.min(100, playerHp + 40);
    stamina = Math.min(STAM_MAX, stamina + STAM_MAX * 0.5);
    spawnParticles(px, py, '#e8b870', 8);
  } else if (food.id === 'raw_chicken') {
    playerHp = Math.min(100, playerHp + 8);
    spawnParticles(px, py, '#c05848', 4);
  }
  food.count--;
  if (food.count <= 0) equipSlots['food'] = null;
}

function updateMovement(dt) {
  const moving    = active('w') || active('a') || active('s') || active('d');
  const sprinting = keys['shift'] && moving && stamina > 0;

  if (sprinting) {
    stamina = Math.max(0, stamina - STAM_DRAIN * dt);
    walkingTimer = 0; staminaReady = false;
  } else if (!moving) {
    staminaReady = true; walkingTimer = 0;
  } else {
    walkingTimer += dt;
    if (walkingTimer >= STAM_REGEN_DELAY) staminaReady = true;
  }
  if (staminaReady && stamina < STAM_MAX)
    stamina = Math.min(STAM_MAX, stamina + STAM_REGEN * dt);

  if (moving) {
    const speed = sprinting ? SPEED * SPRINT_MULT : SPEED;
    px += Math.cos(facingAngle) * speed * dt;
    py += Math.sin(facingAngle) * speed * dt;
    px = Math.max(BODY_R, Math.min(curWorldW() - BODY_R, px));
    py = Math.max(BODY_R, Math.min(curWorldH() - BODY_R, py));
  }

  resolveTreeCollisions();
  resolveRockCollisions();
}

// ===================== DRAW =====================
const GRID = 40;

function drawBg() {
  const ox = camX % GRID, oy = camY % GRID;
  if (inCave) {
    ctx.fillStyle = '#18150f';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#111008'; ctx.lineWidth = 0.5;
    for (let x = -ox; x < W; x += GRID) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = -oy; y < H; y += GRID) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  } else {
    ctx.fillStyle = '#2a5412';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#254d10'; ctx.lineWidth = 0.5;
    for (let x = -ox; x < W; x += GRID) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = -oy; y < H; y += GRID) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    ctx.strokeStyle = '#1e4010'; ctx.lineWidth = 1;
    for (let cx = 0; cx <= CHUNKS_X; cx++) {
      const sx = cx * CHUNK_W - camX;
      ctx.beginPath(); ctx.moveTo(sx,0); ctx.lineTo(sx,H); ctx.stroke();
    }
    for (let cy = 0; cy <= CHUNKS_Y; cy++) {
      const sy = cy * CHUNK_H - camY;
      ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(W,sy); ctx.stroke();
    }
  }
}

function drawBorder() {
  const bx = -camX, by = -camY;
  const gc = inCave ? '#6a4820' : '#3a5a20', sc = inCave ? '#8a6030' : '#4a6a28';
  glow(gc, 18); ctx.strokeStyle = sc; ctx.lineWidth = 4;
  ctx.strokeRect(bx, by, curWorldW(), curWorldH()); noGlow();
}

function drawGrass() {
  for (const chunk of worldChunks) {
    for (const g of chunk.grass) {
      const sx = g.x - camX, sy = g.y - camY;
      if (sx < -30 || sx > W+30 || sy < -30 || sy > H+30) continue;
      for (const b of GRASS_VARIANTS[g.v]) {
        ctx.fillStyle = b.c;
        ctx.fillRect(sx + b.dx, sy - b.h, b.w, b.h);
      }
    }
  }
}

function drawTrunkSeg(sx, segTopY, segH, dx) {
  ctx.fillStyle = '#2a1205';
  ctx.fillRect(sx - TW/2 + dx, segTopY, TW, segH);
  ctx.fillStyle = '#4a2410';
  ctx.fillRect(sx - TW/2 + dx,     segTopY, 2, segH);
  ctx.fillRect(sx + TW/2 - 2 + dx, segTopY, 2, segH);
}

function drawTreeBases() {
  for (const chunk of worldChunks) {
    if (!chunk.tree || chunk.tree.chopped) continue;
    const t  = chunk.tree;
    const sx = Math.round(t.x - camX), sy = Math.round(t.y - camY);
    if (sx < -120 || sx > W+120 || sy < -120 || sy > H+160) continue;
    const trunkTopY = sy + CRY * CBS;
    const trunkBotY = trunkTopY + TH;
    const splitY    = trunkBotY - TCOL;
    for (let i = 0; i < t.segs.length; i++) {
      const segTopY = trunkTopY + i * SEG_H;
      const segBotY = Math.min(segTopY + SEG_H, trunkBotY);
      if (segBotY <= splitY) continue;
      const clampTop = Math.max(segTopY, splitY);
      drawTrunkSeg(sx, clampTop, segBotY - clampTop, t.segs[i]);
    }
  }
}

function drawRockBases() {
  const PS = 5;
  for (const rock of curRocks()) {
    if (rock.mined) continue;
    const sx = Math.round(rock.x - camX) + 4, sy = Math.round(rock.y - camY) + Math.round(ROCK_R * 0.58);
    if (sx < -60 || sx > W+60 || sy < -60 || sy > H+60) continue;
    ctx.fillStyle = inCave ? '#100e08' : '#1c3a0c';
    const rx = ROCK_R * 0.92, ry = ROCK_R * 0.28;
    for (let gy = Math.floor(-ry/PS); gy < Math.ceil(ry/PS); gy++) {
      for (let gx = Math.floor(-rx/PS); gx < Math.ceil(rx/PS); gx++) {
        const cx = (gx + 0.5)*PS, cy = (gy + 0.5)*PS;
        if ((cx/rx)**2 + (cy/ry)**2 > 1) continue;
        ctx.fillRect(sx + gx*PS, sy + gy*PS, PS, PS);
      }
    }
  }
}

function drawTreeTops() {
  for (const chunk of worldChunks) {
    if (!chunk.tree || chunk.tree.chopped) continue;
    const t  = chunk.tree;
    const sx = Math.round(t.x - camX), sy = Math.round(t.y - camY);
    if (sx < -120 || sx > W+120 || sy < -120 || sy > H+160) continue;
    const trunkTopY = sy + CRY * CBS;
    const trunkBotY = trunkTopY + TH;
    const splitY    = trunkBotY - TCOL;
    for (let i = 0; i < t.segs.length; i++) {
      const segTopY = trunkTopY + i * SEG_H;
      const segBotY = Math.min(segTopY + SEG_H, trunkBotY);
      if (segTopY >= splitY) break;
      drawTrunkSeg(sx, segTopY, Math.min(segBotY, splitY) - segTopY, t.segs[i]);
    }
    glow('#0e2a06', 8); ctx.fillStyle = '#0f2408';
    for (const [row, col] of C_OUTER) ctx.fillRect(sx+col*CBS, sy+row*CBS, CBS, CBS);
    noGlow();
    ctx.fillStyle = '#1e4a0e';
    for (const [row, col] of C_MID) ctx.fillRect(sx+col*CBS, sy+row*CBS, CBS, CBS);
    ctx.fillStyle = '#2a6614';
    for (const [row, col] of C_INNER) ctx.fillRect(sx+col*CBS, sy+row*CBS, CBS, CBS);
    ctx.fillStyle = '#3a8a1c';
    ctx.fillRect(sx-CBS, sy-CBS, CBS, CBS);
    ctx.fillRect(sx+CBS*2, sy+CBS, CBS, CBS);
    ctx.fillRect(sx-CBS*3, sy, CBS, CBS);
  }
}

function drawRockTops() {
  const PS = 5;
  for (const rock of curRocks()) {
    if (rock.mined) continue;
    const sx = Math.round(rock.x - camX), sy = Math.round(rock.y - camY);
    if (sx < -60 || sx > W+60 || sy < -60 || sy > H+60) continue;
    const isBronzeRock = rock.type === 'bronze';
    const isCoalRock   = rock.type === 'coal';
    const [cD,cM,cH,cL] = isBronzeRock
      ? ['#3a2010','#6a3818','#a05828','#c87840']
      : isCoalRock
      ? ['#141210','#201e1a','#2c2820','#383428']
      : inCave
      ? ['#2a2820','#3c3830','#504c42','#6a6458']
      : ['#363636','#4c4c4c','#646464','#7e7e7e'];
    const rx = ROCK_R, ry = ROCK_R * 0.72;
    glow('#181818', 10);
    for (let gy = Math.floor(-ry/PS); gy < Math.ceil(ry/PS); gy++) {
      for (let gx = Math.floor(-rx/PS); gx < Math.ceil(rx/PS); gx++) {
        const cx = (gx + 0.5)*PS, cy = (gy + 0.5)*PS;
        const nd = (cx/rx)**2 + (cy/ry)**2;
        if (nd > 1) continue;
        const nr = Math.sqrt(nd);
        let c = nr > 0.78 ? cD : (cx < -rx*0.05 && cy < -ry*0.05 && nr < 0.55) ? cH : cM;
        if (cx < -rx*0.18 && cy < -ry*0.18 && nr < 0.38) c = cL;
        ctx.fillStyle = c;
        ctx.fillRect(sx + gx*PS, sy + gy*PS, PS, PS);
      }
    }
    noGlow();
  }
}

function drawGroundItemBodies() {
  for (const item of curGround()) {
    if (item.pickedUp) continue;
    const sx = item.x - camX, sy = item.y - camY;
    if (sx < -20 || sx > W+20 || sy < -20 || sy > H+20) continue;
    drawItemIcon(item.type, sx, sy, 16);
  }
}

function drawPlayer() {
  const sx = Math.round(px - camX), sy = Math.round(py - camY);
  const PS = 3;
  glow('#7ab038', 16);
  for (let gy = Math.floor(-BODY_R/PS); gy < Math.ceil(BODY_R/PS); gy++) {
    for (let gx = Math.floor(-BODY_R/PS); gx < Math.ceil(BODY_R/PS); gx++) {
      const cx = (gx + 0.5)*PS, cy = (gy + 0.5)*PS;
      const d = Math.sqrt(cx*cx + cy*cy);
      if (d > BODY_R) continue;
      ctx.fillStyle = d > BODY_R - PS*1.8 ? '#7ab038' : '#111a08';
      ctx.fillRect(sx + gx*PS, sy + gy*PS, PS, PS);
    }
  }
  noGlow();
  const hx = Math.round(sx + Math.cos(facingAngle) * HEAD_DIST);
  const hy = Math.round(sy + Math.sin(facingAngle) * HEAD_DIST);
  glow('#d4b058', 10);
  for (let gy = Math.floor(-HEAD_R/PS); gy < Math.ceil(HEAD_R/PS); gy++) {
    for (let gx = Math.floor(-HEAD_R/PS); gx < Math.ceil(HEAD_R/PS); gx++) {
      const cx = (gx + 0.5)*PS, cy = (gy + 0.5)*PS;
      if (Math.sqrt(cx*cx + cy*cy) > HEAD_R) continue;
      ctx.fillStyle = '#d4b058';
      ctx.fillRect(hx + gx*PS, hy + gy*PS, PS, PS);
    }
  }
  noGlow();
}

function drawArrow(sx, sy, color) {
  const bob = Math.sin(performance.now() / 280) * 2.5;
  const ay  = sy - 16 + bob;
  glow(color, 10); ctx.fillStyle = color;
  ctx.beginPath(); ctx.moveTo(sx, ay-5); ctx.lineTo(sx+6, ay+2); ctx.lineTo(sx-6, ay+2);
  ctx.closePath(); ctx.fill(); noGlow();
}

function drawHealthBar(sx, sy, current, max, color) {
  const bw = 40, bh = 4, bx = sx - bw/2;
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(bx, sy, bw, bh);
  ctx.fillStyle = color;     ctx.fillRect(bx, sy, bw * (current/max), bh);
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 0.5; ctx.strokeRect(bx, sy, bw, bh);
}

function drawTargetIndicators() {
  // Ground item pickup
  if (nearbyItem && !nearbyItem.pickedUp)
    drawArrow(nearbyItem.x - camX, nearbyItem.y - camY, '#e8e8a0');

  // Tree chop
  if (nearbyChopTarget && !nearbyChopTarget.chopped) {
    const sx = nearbyChopTarget.x - camX;
    const sy = nearbyChopTarget.y - camY - CRY * CBS;
    drawArrow(sx, sy, '#90d040');
    if (nearbyChopTarget.chopsLeft !== undefined)
      drawHealthBar(sx, sy - 18, nearbyChopTarget.chopsLeft, nearbyChopTarget.chopHealth, '#5aaa28');
  }

  // Rock mine
  if (nearbyMineTarget && !nearbyMineTarget.mined) {
    const sx = nearbyMineTarget.x - camX;
    const sy = nearbyMineTarget.y - camY - ROCK_R - 4;
    drawArrow(sx, sy, '#b8b8b8');
    if (nearbyMineTarget.hitsLeft !== undefined)
      drawHealthBar(sx, sy - 18, nearbyMineTarget.hitsLeft, nearbyMineTarget.mineHealth, '#888888');
  }
}

function drawStamina() {
  const BAR_W = 100, BAR_H = 6, bx = 14, by = H - 24;
  const fill  = (stamina / STAM_MAX) * BAR_W;
  const color = keys['shift'] && stamina > 0 ? '#e87820' : staminaReady ? '#5aaa28' : '#1e3a10';
  ctx.fillStyle = '#1a3010'; ctx.fillRect(bx, by, BAR_W, BAR_H);
  if (fill > 0) { glow(color, keys['shift'] ? 10 : 5); ctx.fillStyle = color; ctx.fillRect(bx, by, fill, BAR_H); noGlow(); }
  ctx.strokeStyle = '#264018'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, BAR_W, BAR_H);
}

// ===================== ATTACK / CLICK =====================
const SWORD_RANGE = 70;

function handleAttackClick(mx, my) {
  const sword   = equipSlots['weapon'];
  const hatchet = equipSlots['hatchet_slot'];
  const pickaxe = equipSlots['pickaxe_slot'];
  const wx = mx + camX, wy = my + camY;

  if (sword && (sword.id === 'sword' || sword.id === 'bronze_sword')) {
    const dmg = sword.id === 'bronze_sword' ? 12 : 5;
    for (const m of mobs) {
      if (m.dead) continue;
      const dx = m.x - px, dy = m.y - py;
      if (Math.sqrt(dx*dx + dy*dy) > SWORD_RANGE) continue;
      const cdx = wx - m.x, cdy = wy - m.y;
      if (Math.sqrt(cdx*cdx + cdy*cdy) > 36) continue;
      m.hp -= dmg;
      spawnParticles(m.x, m.y, sword.id === 'bronze_sword' ? '#e08020' : '#cc2020', 4);
      if (m.hp <= 0) { m.dead = true; m.hp = 0; killMob(m); }
    }
  }
  if (hatchet && (hatchet.id === 'hatchet' || hatchet.id === 'bronze_hatchet')) {
    const power = hatchet.id === 'bronze_hatchet' ? 2 : 1;
    let best = null, bestD = Infinity;
    for (const chunk of worldChunks) {
      if (!chunk.tree || chunk.tree.chopped) continue;
      const t = chunk.tree;
      const dx = t.x - px, dy = (t.y + CRY*CBS + TH*0.6) - py;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < CHOP_RANGE && d < bestD) { bestD = d; best = t; }
    }
    if (best) chopTree(best, power);
  }
  if (pickaxe && (pickaxe.id === 'pickaxe' || pickaxe.id === 'bronze_pickaxe')) {
    const power = pickaxe.id === 'bronze_pickaxe' ? 2 : 1;
    let best = null, bestD = Infinity;
    for (const rock of curRocks()) {
      if (rock.mined) continue;
      const dx = rock.x - px, dy = rock.y - py;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < MINE_RANGE && d < bestD) { bestD = d; best = rock; }
    }
    if (best) mineRock(best, power);
  }
}

function killMob(m) {
  if (m.type === 'chicken') {
    score += 25;
    worldGroundItems.push({ type: 'raw_chicken', x: m.x + (Math.random()-0.5)*20, y: m.y + (Math.random()-0.5)*20, pickedUp: false });
    const feathers = Math.floor(Math.random() * 3); // 0, 1, or 2
    for (let i = 0; i < feathers; i++)
      worldGroundItems.push({ type: 'feather', x: m.x + (Math.random()-0.5)*20, y: m.y + (Math.random()-0.5)*20, pickedUp: false });
    spawnParticles(m.x, m.y, '#e8e0c8', 8);
  } else if (m.type === 'zombie') {
    score += m.subtype === 'brute' ? 100 : m.subtype === 'quick' ? 75 : 50;
    if (Math.random() < 1/3) {
      const a = Math.random() * Math.PI * 2, d = 8 + Math.random() * 16;
      worldGroundItems.push({ type: 'bone', x: m.x + Math.cos(a)*d, y: m.y + Math.sin(a)*d, pickedUp: false });
    }
    if (m.subtype === 'brute') {
      const numRocks = 1 + Math.floor(Math.random() * 2);
      for (let i = 0; i < numRocks; i++) {
        const a = Math.random() * Math.PI * 2, d = 10 + Math.random() * 20;
        worldGroundItems.push({ type: 'rock', x: m.x + Math.cos(a)*d, y: m.y + Math.sin(a)*d, pickedUp: false });
      }
      spawnParticles(m.x, m.y, '#909090', 8);
    }
  }
}

// ===================== MOBS =====================
const MAX_MOBS = 8;
const MOB_COLL_R = 14;

function spawnMob(type, cap) {
  if (mobs.filter(m => !m.dead && m.type === type).length >= (cap || MAX_MOBS)) return;
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  if      (edge === 0) { x = camX + Math.random() * W; y = camY - 80; }
  else if (edge === 1) { x = camX + Math.random() * W; y = camY + H + 80; }
  else if (edge === 2) { x = camX - 80;                y = camY + Math.random() * H; }
  else                 { x = camX + W + 80;            y = camY + Math.random() * H; }
  x = Math.max(50, Math.min(curWorldW() - 50, x));
  y = Math.max(50, Math.min(curWorldH() - 50, y));
  let subtype = 'normal', hp = 10;
  if (type === 'zombie') {
    const r = Math.random();
    if      (r < 1/15)        { subtype = 'brute'; hp = 25; }
    else if (r < 1/15 + 1/10) { subtype = 'quick'; hp = 4; }
  }
  mobs.push({
    type, subtype, x, y,
    hp, maxHp: hp,
    vx: 0, vy: 0, dir: 1, drawScale: 1, animTimer: 0,
    dead: false, deathTimer: 0,
  });
}

function updateMobs(dt, now) {
  if (!inCave && now - lastMobSpawn > 5) {
    lastMobSpawn = now;
    if (darkAlpha > 0.6) spawnMob('zombie');
  }
  if (!inCave && darkAlpha < 0.4 && now - lastChickenSpawn > 2.5) {
    lastChickenSpawn = now;
    spawnMob('chicken', 6);
  }
  if (inCave && now - lastCaveMobSpawn > 28) {
    lastCaveMobSpawn = now;
    spawnMob('zombie', 3);
  }
  for (let i = mobs.length - 1; i >= 0; i--) {
    const m = mobs[i];
    if (m.dead) { m.deathTimer += dt; if (m.deathTimer > 1) mobs.splice(i, 1); continue; }
    if (!inCave && m.type === 'zombie' && darkAlpha < 0.3) { m.dead = true; continue; }
    if (m.type === 'chicken' && darkAlpha > 0.7) { m.dead = true; continue; }
    m.animTimer += dt;
    const dx = px - m.x, dy = py - m.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (m.type === 'zombie') {
      // Check fire flee (campfires + torches)
      let fleeX = 0, fleeY = 0, nearFire = false;
      for (const f of campfires) {
        if (f.cave !== inCave) continue;
        const fdx = m.x - f.x, fdy = m.y - f.y;
        const fd = Math.sqrt(fdx*fdx + fdy*fdy);
        if (fd < 180 && fd > 0) { fleeX += fdx/fd; fleeY += fdy/fd; nearFire = true; }
      }
      for (const f of torches) {
        if (f.cave !== inCave) continue;
        const fdx = m.x - f.x, fdy = m.y - f.y;
        const fd = Math.sqrt(fdx*fdx + fdy*fdy);
        if (fd < 120 && fd > 0) { fleeX += fdx/fd; fleeY += fdy/fd; nearFire = true; }
      }
      const spd = m.subtype === 'brute' ? 32 : m.subtype === 'quick' ? 105 : 55;
      const dmg = m.subtype === 'brute' ? 12 : m.subtype === 'quick' ? 2  : 5;
      const cd  = m.subtype === 'brute' ? 1.2 : m.subtype === 'quick' ? 0.35 : 0.8;
      if (nearFire) {
        const fl = Math.sqrt(fleeX*fleeX + fleeY*fleeY);
        m.vx = (fleeX/fl)*spd; m.vy = (fleeY/fl)*spd;
      } else if (dist > 0) {
        m.vx = (dx/dist)*spd; m.vy = (dy/dist)*spd;
      }
      if (dist > 0) m.dir = (m.vx > 0 ? 1 : -1);
      if (dist < BODY_R + MOB_COLL_R && now - lastZombieDmg > cd) {
        const helmet = equipSlots['helmet'];
        const chest  = equipSlots['chestplate'];
        let armor = 0;
        const pants2 = equipSlots['pants'];
        if (helmet && helmet.id === 'feather_hat')   armor += 1;
        if (chest  && chest.id  === 'bone_armor')    armor += 3;
        if (pants2 && pants2.id === 'feather_pants') armor += 1;
        playerHp = Math.max(0, playerHp - Math.max(1, dmg - armor));
        lastZombieDmg = now; lastHitTime = now;
        spawnParticles(px, py, '#cc2020', 3);
      }
    } else {
      const fleeRange = 120;
      if (dist < fleeRange && dist > 0) {
        m.vx = -(dx/dist)*70; m.vy = -(dy/dist)*70; m.dir = dx > 0 ? -1 : 1;
      } else if (Math.floor(m.animTimer * 1.5) % 3 === 0) {
        const a = Math.random() * Math.PI * 2;
        m.vx = Math.cos(a)*28; m.vy = Math.sin(a)*28;
        m.dir = m.vx > 0 ? 1 : -1;
      }
      // Smooth turn: lerp drawScale toward target dir
      m.drawScale += (m.dir - m.drawScale) * Math.min(1, dt * 10);
    }
    m.x += m.vx * dt; m.y += m.vy * dt;
    m.x = Math.max(30, Math.min(curWorldW()-30, m.x));
    m.y = Math.max(30, Math.min(curWorldH()-30, m.y));
  }
}

function drawMobs() {
  for (const m of mobs) {
    const sx = Math.round(m.x - camX), sy = Math.round(m.y - camY);
    if (sx < -50 || sx > W+50 || sy < -50 || sy > H+50) continue;
    const alpha = m.dead ? Math.max(0, 1 - m.deathTimer) : 1;
    ctx.globalAlpha = alpha;
    const bob = Math.sin(m.animTimer * 5) * 1.5;
    if (m.type === 'zombie') {
      const zs  = m.subtype === 'brute' ? 1.5 : m.subtype === 'quick' ? 0.72 : 1.0;
      const bcol = m.subtype === 'brute' ? '#14280a' : m.subtype === 'quick' ? '#2a5a18' : '#1e3a12';
      const hcol = m.subtype === 'brute' ? '#1c3410' : m.subtype === 'quick' ? '#3a7020' : '#2a4a18';
      const zb = bob * zs;
      ctx.fillStyle = bcol; ctx.fillRect(sx-8*zs, sy-18*zs+zb, 16*zs, 20*zs);
      ctx.fillStyle = hcol; ctx.fillRect(sx-7*zs, sy-32*zs+zb, 14*zs, 14*zs);
      ctx.fillStyle = m.subtype === 'quick' ? '#ff8020' : '#cc2020';
      ctx.fillRect(sx-4*zs, sy-27*zs+zb, 3*zs, 3*zs); ctx.fillRect(sx+1*zs, sy-27*zs+zb, 3*zs, 3*zs);
      const aw = Math.sin(m.animTimer*4)*3*zs;
      ctx.fillStyle = bcol; ctx.fillRect(sx-15*zs, sy-16*zs+aw, 7*zs, 12*zs); ctx.fillRect(sx+8*zs, sy-16*zs-aw, 7*zs, 12*zs);
      if (m.hp < m.maxHp) {
        const bw = 24*zs, bx2 = sx - bw/2, by2 = sy - 40*zs + zb;
        ctx.fillStyle = '#300'; ctx.fillRect(bx2, by2, bw, 3);
        ctx.fillStyle = '#a03020'; ctx.fillRect(bx2, by2, bw * m.hp/m.maxHp, 3);
      }
    } else {
      // Pixel art chicken — drawn facing right, flipped via drawScale
      const ps = 3;
      ctx.save();
      ctx.translate(sx, sy + Math.round(bob));
      ctx.scale(m.drawScale, 1);
      const ox = -4 * ps, oy = -6 * ps;
      function dot(c, x, y) { ctx.fillStyle = c; ctx.fillRect(ox+x*ps, oy+y*ps, ps, ps); }
      const W2='#e8e0c8', G2='#c8c4aa', T2='#d4c89a', R2='#cc2020', B2='#e89020', Y2='#c0a050';
      // tail
      [[T2,0,2],[T2,0,3],[T2,1,2],[T2,1,3],[T2,0,4],[T2,1,4]].forEach(([c,x,y])=>dot(c,x,y));
      // wing accent
      [[G2,2,2],[G2,2,3],[G2,2,4]].forEach(([c,x,y])=>dot(c,x,y));
      // body
      [[W2,3,2],[W2,4,2],[W2,5,2],[W2,3,3],[W2,4,3],[W2,5,3],[W2,6,3],
       [W2,3,4],[W2,4,4],[W2,5,4],[W2,3,5],[W2,4,5]].forEach(([c,x,y])=>dot(c,x,y));
      // head
      [[W2,4,1],[W2,5,1],[W2,4,0]].forEach(([c,x,y])=>dot(c,x,y));
      // comb
      dot(R2,4,0); dot(R2,5,0);
      // beak
      dot(B2,6,1); dot(B2,7,1);
      // legs + feet
      const lb = Math.round(Math.sin(m.animTimer*7)*1);
      ctx.fillStyle = Y2;
      ctx.fillRect(ox+3*ps, oy+6*ps, ps, ps+lb); ctx.fillRect(ox+4*ps, oy+6*ps, ps, ps-lb);
      ctx.fillRect(ox+3*ps, oy+7*ps-lb, ps, ps); ctx.fillRect(ox+4*ps, oy+7*ps+lb, ps, ps);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }
}

// ===================== CAMPFIRE DRAW =====================
function drawCampfires() {
  const t = performance.now() / 1000;
  const PS = 3;
  for (const f of campfires) {
    if (f.cave !== inCave) continue;
    const sx = Math.round(f.x - camX), sy = Math.round(f.y - camY);
    if (sx < -30 || sx > W+30 || sy < -30 || sy > H+30) continue;
    // Logs
    ctx.fillStyle = '#3d1a05';
    ctx.fillRect(sx-9, sy,   18, PS); // horizontal log
    ctx.fillRect(sx-6, sy+PS, PS*2, PS); // left end
    ctx.fillRect(sx+3, sy+PS, PS*2, PS); // right end
    ctx.fillStyle = '#5c2a0a';
    ctx.fillRect(sx-3, sy, PS*2, PS); // log highlight
    // Flame — alternates between two pixel frames
    const frame = Math.floor(t * 8 + f.x * 0.1) % 2;
    glow('#e05010', 8);
    // Base flame (orange)
    const fp = [
      // col, row (relative to sx, sy-1)
      [0,-3],[0,-4],[-1,-3],[-1,-4],[1,-3],
      [0,-5],[-1,-5],[1,-4],
      [0,-6],
    ];
    const fp2 = [
      [0,-3],[0,-4],[-1,-3],[1,-3],[1,-4],
      [-1,-4],[0,-5],[1,-5],
      [0,-6],[-1,-5],
    ];
    const flame = frame === 0 ? fp : fp2;
    ctx.fillStyle = '#e05010';
    for (const [dc,dr] of flame) ctx.fillRect(sx+dc*PS, sy+dr*PS, PS, PS);
    // Inner flame (yellow-orange)
    ctx.fillStyle = '#ffa020';
    ctx.fillRect(sx,    sy-4*PS, PS, PS);
    ctx.fillRect(sx,    sy-3*PS, PS, PS);
    ctx.fillRect(sx-PS, sy-3*PS, PS, PS);
    // Core (bright yellow)
    ctx.fillStyle = '#ffe060';
    ctx.fillRect(sx, sy-3*PS, PS, PS);
    noGlow();
  }
}

// ===================== TORCHES (WORLD) =====================
function drawTorches() {
  const t = performance.now() / 1000;
  for (const f of torches) {
    if (f.cave !== inCave) continue;
    const sx = Math.round(f.x - camX), sy = Math.round(f.y - camY);
    if (sx < -20 || sx > W+20 || sy < -20 || sy > H+20) continue;
    // Stake
    ctx.fillStyle = '#5c2a0a';
    ctx.fillRect(sx-2, sy-2, 4, 14);
    // Flame
    const flick = Math.sin(t * 11 + f.x * 0.02) * 1.5;
    ctx.fillStyle = '#e05010';
    ctx.beginPath(); ctx.ellipse(sx, sy-9, 3+flick, 6+flick, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffa020';
    ctx.beginPath(); ctx.ellipse(sx, sy-10, 2+flick*0.4, 4+flick*0.8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffe060';
    ctx.beginPath(); ctx.ellipse(sx, sy-9, 1, 2, 0, 0, Math.PI*2); ctx.fill();
  }
}

// ===================== NIGHT OVERLAY =====================
function drawNightOverlay() {
  const effectiveDark = inCave ? 1 : darkAlpha;
  if (effectiveDark <= 0.01) return;
  lctx.clearRect(0, 0, W, H);
  lctx.fillStyle = inCave
    ? `rgba(5, 3, 0, 0.78)`
    : `rgba(0, 5, 25, ${(effectiveDark * 0.9).toFixed(3)})`;
  lctx.fillRect(0, 0, W, H);
  lctx.globalCompositeOperation = 'destination-out';
  // Player ambient glow
  const psx = px - camX, psy = py - camY;
  const pGlowR = inCave ? 120 : 70;
  const pg = lctx.createRadialGradient(psx, psy, 0, psx, psy, pGlowR);
  pg.addColorStop(0, `rgba(255,255,255,${(0.55 * effectiveDark).toFixed(3)})`);
  pg.addColorStop(1, 'rgba(255,255,255,0)');
  lctx.fillStyle = pg; lctx.fillRect(0, 0, W, H);
  // Campfires
  for (const f of campfires) {
    if (f.cave !== inCave) continue;
    const fx = f.x - camX, fy = f.y - camY;
    if (fx < -220 || fx > W+220 || fy < -220 || fy > H+220) continue;
    const fg = lctx.createRadialGradient(fx, fy, 0, fx, fy, 180);
    fg.addColorStop(0, `rgba(255,200,100,${(0.95 * effectiveDark).toFixed(3)})`);
    fg.addColorStop(0.5, `rgba(255,160,60,${(0.55 * effectiveDark).toFixed(3)})`);
    fg.addColorStop(1, 'rgba(255,100,20,0)');
    lctx.fillStyle = fg; lctx.fillRect(0, 0, W, H);
  }
  // Torches
  for (const f of torches) {
    if (f.cave !== inCave) continue;
    const fx = f.x - camX, fy = f.y - camY;
    if (fx < -120 || fx > W+120 || fy < -120 || fy > H+120) continue;
    const tg = lctx.createRadialGradient(fx, fy, 0, fx, fy, 100);
    tg.addColorStop(0, `rgba(255,200,100,${(0.85 * effectiveDark).toFixed(3)})`);
    tg.addColorStop(0.5, `rgba(255,150,50,${(0.4 * effectiveDark).toFixed(3)})`);
    tg.addColorStop(1, 'rgba(255,100,20,0)');
    lctx.fillStyle = tg; lctx.fillRect(0, 0, W, H);
  }
  lctx.globalCompositeOperation = 'source-over';
  ctx.drawImage(lightCanvas, 0, 0);
}

// ===================== ATTACK RADIUS =====================
function drawAttackRadius() {
  const sx = px - camX, sy = py - camY;
  ctx.save();
  function rangeCircle(r, col) {
    ctx.globalAlpha = 0.07; ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.18; ctx.strokeStyle = col; ctx.lineWidth = 1;
    ctx.setLineDash([4, 5]); ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }
  const sword   = equipSlots['weapon'];
  const hatchet = equipSlots['hatchet_slot'];
  const pickaxe = equipSlots['pickaxe_slot'];
  if (sword   && (sword.id   === 'sword'   || sword.id   === 'bronze_sword'))   rangeCircle(SWORD_RANGE, sword.id   === 'bronze_sword'   ? '#e08020' : '#ff6060');
  if (hatchet && (hatchet.id === 'hatchet' || hatchet.id === 'bronze_hatchet')) rangeCircle(CHOP_RANGE,  hatchet.id === 'bronze_hatchet' ? '#d07030' : '#90d040');
  if (pickaxe && (pickaxe.id === 'pickaxe' || pickaxe.id === 'bronze_pickaxe')) rangeCircle(MINE_RANGE,  pickaxe.id === 'bronze_pickaxe' ? '#d07030' : '#b8b8b8');
  ctx.restore();
}

// ===================== CRAFTING STATIONS (WORLD) =====================
function drawCraftingStations() {
  for (const s of craftingStations) {
    if (s.cave !== inCave) continue;
    const sx = Math.round(s.x - camX), sy = Math.round(s.y - camY);
    if (sx < -50 || sx > W+50 || sy < -50 || sy > H+50) continue;
    // Tabletop
    ctx.fillStyle = '#5c2a0a'; ctx.fillRect(sx-16, sy-5, 32, 7);
    ctx.fillStyle = '#8a5020'; ctx.fillRect(sx-16, sy-5, 32, 2);
    ctx.fillStyle = '#3d1a05'; ctx.fillRect(sx-16, sy+1,  32, 1);
    // Legs
    ctx.fillStyle = '#4a2208';
    ctx.fillRect(sx-13, sy+2, 4, 12); ctx.fillRect(sx+9, sy+2, 4, 12);
    // Range indicator when nearby
    const dist = Math.sqrt((s.x-px)**2 + (s.y-py)**2);
    if (dist < STATION_RANGE) {
      ctx.save();
      ctx.globalAlpha = 0.07; ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 1;
      ctx.setLineDash([3, 4]);
      ctx.beginPath(); ctx.arc(sx, sy, STATION_RANGE, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    }
  }
}

function drawCampfirePreview() {
  const weapon = equipSlots['furniture'];

  if (weapon.id === 'campfire') {
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#3d1a05';
    ctx.fillRect(sx-9, sy-2, 18, 4); ctx.fillRect(sx-2, sy-9, 4, 11);
    ctx.fillStyle = '#e05010'; ctx.fillRect(sx-3, sy-16, 6, 8);
    ctx.fillStyle = '#ffc020'; ctx.fillRect(sx-2, sy-16, 3, 6);
  } else if (weapon.id === 'crafting_station') {
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#5c2a0a'; ctx.fillRect(sx-16, sy-5, 32, 7);
    ctx.fillStyle = '#8a5020'; ctx.fillRect(sx-16, sy-5, 32, 2);
    ctx.fillStyle = '#4a2208';
    ctx.fillRect(sx-13, sy+2, 4, 10); ctx.fillRect(sx+9, sy+2, 4, 10);
  } else if (weapon.id === 'mine_entrance') {
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#2a2018'; ctx.fillRect(sx-20, sy-20, 40, 30);
    ctx.fillStyle = '#080604'; ctx.fillRect(sx-13, sy-16, 26, 22);
    ctx.fillStyle = '#4a3820'; ctx.fillRect(sx-20, sy+10, 40, 6);
  } else if (weapon.id === 'furnace') {
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#4a3828'; ctx.fillRect(sx-18, sy-18, 36, 36);

// ===================== MAP =====================
function drawMap() {
  const PAD = 20, MW = 300, MH = 210;
  const mx = Math.round((W - MW) / 2), my = Math.round((H - MH) / 2);

  // Background panel
  ctx.fillStyle = 'rgba(4,3,12,0.88)'; ctx.fillRect(mx, my, MW, MH);
  glow('#a855f7', 12); ctx.strokeStyle = '#7c3aed'; ctx.lineWidth = 1.5;
  ctx.strokeRect(mx, my, MW, MH); noGlow();

  ctx.fillStyle = '#a855f7'; ctx.font = '600 10px monospace';
  ctx.letterSpacing = '0.12em'; ctx.textAlign = 'center';
  ctx.fillText(inCave ? 'MAP — CAVE' : 'MAP', mx + MW/2, my + 16);
  ctx.letterSpacing = '0'; ctx.textAlign = 'left';

  // World area inside panel
  const WX = mx + PAD, WY = my + 26, WW = MW - PAD*2, WH = MH - 26 - PAD;
  const ww = curWorldW(), wh = curWorldH();
  const scaleX = WW / ww, scaleY = WH / wh;

  // World border
  ctx.fillStyle = inCave ? '#0d0c08' : '#0a1a06'; ctx.fillRect(WX, WY, WW, WH);
  ctx.strokeStyle = inCave ? '#3a2a10' : '#2a4a14'; ctx.lineWidth = 1;
  ctx.strokeRect(WX, WY, WW, WH);

  // Chunk grid lines (surface only)
  if (!inCave) {
    ctx.strokeStyle = '#162810'; ctx.lineWidth = 0.5;
    for (let cx = 1; cx < CHUNKS_X; cx++) {
      const sx = WX + cx * CHUNK_W * scaleX;
      ctx.beginPath(); ctx.moveTo(sx, WY); ctx.lineTo(sx, WY+WH); ctx.stroke();
    }
    for (let cy = 1; cy < CHUNKS_Y; cy++) {
      const sy = WY + cy * CHUNK_H * scaleY;
      ctx.beginPath(); ctx.moveTo(WX, sy); ctx.lineTo(WX+WW, sy); ctx.stroke();
    }
  }

  // Campfire icons (current world only)
  for (const f of campfires) {
    if (f.cave !== inCave) continue;
    const fx = WX + f.x * scaleX, fy = WY + f.y * scaleY;
    if (fx < WX || fx > WX+WW || fy < WY || fy > WY+WH) continue;
    // Tiny flame
    ctx.fillStyle = '#3d1a05'; ctx.fillRect(fx-2, fy, 4, 2);
    glow('#e05010', 4); ctx.fillStyle = '#e05010';
    ctx.fillRect(fx-1, fy-3, 2, 3);
    ctx.fillStyle = '#ffa020'; ctx.fillRect(fx-0, fy-2, 1, 2);
    noGlow();
  }

  // Player dot
  const pdx = WX + px * scaleX, pdy = WY + py * scaleY;
  glow('#7ab038', 8); ctx.fillStyle = '#7ab038';
  ctx.beginPath(); ctx.arc(pdx, pdy, 4, 0, Math.PI*2); ctx.fill(); noGlow();
  ctx.fillStyle = '#d4b058';
  ctx.beginPath(); ctx.arc(pdx, pdy, 2, 0, Math.PI*2); ctx.fill();

  // M to close hint
  ctx.fillStyle = '#3a2a50'; ctx.font = '500 8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('[M] close', mx + MW - 8, my + MH - 6);
  ctx.textAlign = 'left';
}

// ===================== GAME OVER =====================
function checkGameOver() {
  if (!gameOver && playerHp <= 0) { gameOver = true; playerHp = 0; }
}

function restartGame() {
  playerHp = 100; score = 0; gameOver = false; lastHitTime = -999;
  mobs.length = 0; campfires.length = 0; craftingStations.length = 0;
  mineEntrances.length = 0; furnaces.length = 0; torches.length = 0; saplings.length = 0;
  inCave = false; mineExits.length = 0;
  inventorySlots.fill(null);
  for (const k of Object.keys(equipSlots)) equipSlots[k] = null;
  px = WORLD_W / 2; py = WORLD_H / 2;
  heldSlot = null; inventoryOpen = false; mapOpen = false; craftScrollY = 0;
  cycleTime = 0; darkAlpha = 0; respawnTimer = 0; gameTime = 0;
  lastMobSpawn = -999; lastCaveMobSpawn = -999; lastChickenSpawn = -999;
  shadowSightings.length = 0; lastShadowAppear = -9999;
  generateSurfaceWorld();
  generateCaveWorld();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.80)';
  ctx.fillRect(0, 0, W, H);
  ctx.save(); ctx.textAlign = 'center';
  glow('#ff4040', 22); ctx.fillStyle = '#ff4040';
  ctx.font = '700 52px monospace'; ctx.fillText('GAME OVER', W/2, H/2 - 70);
  noGlow();
  ctx.fillStyle = '#c084fc'; ctx.font = '600 20px monospace';
  ctx.fillText(`SCORE: ${score}`, W/2, H/2 - 20);
  // Restart button
  const bx = W/2 - 90, by = H/2 + 14, bw = 180, bh = 44;
  ctx.fillStyle = '#0a0718'; ctx.fillRect(bx, by, bw, bh);
  glow('#a855f7', 10); ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 1.5;
  ctx.strokeRect(bx, by, bw, bh); noGlow();
  ctx.fillStyle = '#e0d0ff'; ctx.font = '700 16px monospace';
  ctx.fillText('PLAY AGAIN', W/2, by + 28);
  ctx.restore();
}

let _gameOverClickBound = false;
function initGameOverClick() {
  if (_gameOverClickBound) return;
  _gameOverClickBound = true;
  canvas.addEventListener('click', e => {
    if (!gameOver) return;
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const bx = W/2 - 90, by = H/2 + 14, bw = 180, bh = 44;
    if (mx >= bx && mx < bx+bw && my >= by && my < by+bh) restartGame();
  });
}

// ===================== PLAYER HP =====================
function drawPlayerHp() {
  const BAR_W = 80, BAR_H = 6, bx = 14, by = H - 36;
  ctx.fillStyle = '#2a0808'; ctx.fillRect(bx, by, BAR_W, BAR_H);
  const fill = (playerHp / 100) * BAR_W;
  const col = playerHp > 50 ? '#4aaa28' : playerHp > 25 ? '#e87820' : '#cc2020';
  if (fill > 0) { glow(col, 5); ctx.fillStyle = col; ctx.fillRect(bx, by, fill, BAR_H); noGlow(); }
  ctx.strokeStyle = '#3a1010'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, BAR_W, BAR_H);
  ctx.fillStyle = '#a06060'; ctx.font = '500 7px monospace'; ctx.fillText('HP', bx + BAR_W + 4, by + 5);
}

// ===================== SAPLINGS =====================
function updateSaplings() {
  for (let i = saplings.length - 1; i >= 0; i--) {
    const s = saplings[i];
    if (gameNow - s.plantedTime < CYCLE_LEN) continue;
    saplings.splice(i, 1);
    const numSegs = Math.ceil(TH / SEG_H);
    const segs = [];
    let drift = 0;
    for (let j = 0; j < numSegs; j++) {
      drift += Math.round(Math.random() * 6 - 3);
      drift = Math.max(-6, Math.min(6, drift));
      segs.push(drift);
    }
    worldChunks.push({ grass: [], tree: {
      x: s.x, y: s.y, segs,
      chopped: false, chopHealth: undefined, chopsLeft: undefined,
    }});
    spawnParticles(s.x, s.y, '#3a8a1c', 14);
    spawnParticles(s.x, s.y, '#5c2a0a', 6);
  }
}

const ROCK_RESPAWN_TIME = CYCLE_LEN * 2; // ~170s, two full day cycles
function updateCaveRockRespawn() {
  for (const rock of caveRocks) {
    if (!rock.mined || rock.minedTime === undefined) continue;
    if (gameNow - rock.minedTime < ROCK_RESPAWN_TIME) continue;
    rock.mined = false; rock.minedTime = undefined;
    rock.mineHealth = rock.type === 'bronze' ? 5 : rock.type === 'coal' ? 3 : 4;
    rock.hitsLeft = rock.mineHealth;
  }
}

function drawSaplings() {
  for (const s of saplings) {
    const sx = Math.round(s.x - camX), sy = Math.round(s.y - camY);
    if (sx < -20 || sx > W+20 || sy < -20 || sy > H+20) continue;
    // Stem
    ctx.fillStyle = '#5c2a0a';
    ctx.fillRect(sx-2, sy-10, 4, 10);
    // Leaves
    ctx.fillStyle = '#2a6614';
    ctx.fillRect(sx-8, sy-16, 16, 7);
    ctx.fillStyle = '#3a8020';
    ctx.fillRect(sx-5, sy-22, 10, 7);
    ctx.fillStyle = '#4a9a28';
    ctx.fillRect(sx-3, sy-26, 6, 5);
    // Progress indicator (age bar)
    const age = Math.min(1, (gameNow - s.plantedTime) / CYCLE_LEN);
    if (age > 0) {
      ctx.fillStyle = '#1a2a10'; ctx.fillRect(sx-12, sy+4, 24, 3);
      ctx.fillStyle = '#5aaa28'; ctx.fillRect(sx-12, sy+4, Math.round(24*age), 3);
    }
  }
}

// ===================== REGEN + RESPAWN =====================
function updatePlayerRegen(dt, now) {
  if (playerHp < 100 && now - lastHitTime > 15)
    playerHp = Math.min(100, playerHp + 1.2 * dt);
}

function updateRespawns(dt) {
  respawnTimer += dt;
  if (respawnTimer < CYCLE_LEN) return;
  respawnTimer -= CYCLE_LEN;

  // Respawn up to 2 random chopped trees
  const choppedTrees = worldChunks.filter(c => c.tree && c.tree.chopped);
  for (let i = 0; i < Math.min(2, choppedTrees.length); i++) {
    const idx = Math.floor(Math.random() * choppedTrees.length);
    const t = choppedTrees.splice(idx, 1)[0].tree;
    t.chopped = false; t.chopHealth = undefined; t.chopsLeft = undefined;
    spawnParticles(t.x, t.y + CRY * CBS, '#3a8a1c', 12);
    spawnParticles(t.x, t.y + CRY * CBS, '#4a8a1c', 8);
  }

  // Respawn up to 2 random mined rocks
  const minedRocks = worldRocks.filter(r => r.mined);
  for (let i = 0; i < Math.min(2, minedRocks.length); i++) {
    const idx = Math.floor(Math.random() * minedRocks.length);
    const r = minedRocks.splice(idx, 1)[0];
    r.mined = false; r.mineHealth = undefined; r.hitsLeft = undefined;
    spawnParticles(r.x, r.y, '#909090', 10);
  }
}

// ===================== SHADOW FIGURE =====================
const shadowSightings = []; // { x, y, timer, duration }
let lastShadowAppear = -9999;

function updateShadow(dt, now) {
  for (let i = shadowSightings.length - 1; i >= 0; i--) {
    shadowSightings[i].timer += dt;
    if (shadowSightings[i].timer >= shadowSightings[i].duration) shadowSightings.splice(i, 1);
  }
  const day = getCurrentDay();
  if (inCave || day < 3 || shadowSightings.length > 0) return;
  // Delay: 45s on day 3, shrinks 3s/day, min 8s
  const delay = Math.max(8, 45 - (day - 3) * 3);
  if (now - lastShadowAppear < delay) return;
  lastShadowAppear = now;
  if (Math.random() > 0.65) return; // extra randomness so it doesn't feel clockwork

  // Collect visible trees and rocks as peek positions
  const candidates = [];
  for (const chunk of worldChunks) {
    if (!chunk.tree || chunk.tree.chopped) continue;
    const t = chunk.tree;
    const sx = t.x - camX, sy = t.y - camY;
    if (sx > 80 && sx < W - 80 && sy > 80 && sy < H - 80)
      candidates.push({ x: t.x + (Math.random() < 0.5 ? -28 : 28), y: t.y + 8 });
  }
  for (const rock of worldRocks) {
    if (rock.mined) continue;
    const sx = rock.x - camX, sy = rock.y - camY;
    if (sx > 80 && sx < W - 80 && sy > 80 && sy < H - 80)
      candidates.push({ x: rock.x + (Math.random() < 0.5 ? -22 : 22), y: rock.y });
  }
  if (candidates.length === 0) return;
  const pos = candidates[Math.floor(Math.random() * candidates.length)];
  shadowSightings.push({ x: pos.x, y: pos.y, timer: 0, duration: 0.15 + Math.random() * 0.3 });
}

function drawShadowFigures() {
  for (const s of shadowSightings) {
    const sx = Math.round(s.x - camX), sy = Math.round(s.y - camY);
    const prog = s.timer / s.duration;
    const alpha = prog < 0.25 ? prog / 0.25 : prog > 0.75 ? (1 - prog) / 0.25 : 1;
    ctx.globalAlpha = Math.min(alpha * 0.88, 0.88);
    const PS = 3;
    // Red pixelated body
    glow('#cc0000', 14);
    for (let gy = Math.floor(-BODY_R/PS); gy < Math.ceil(BODY_R/PS); gy++) {
      for (let gx = Math.floor(-BODY_R/PS); gx < Math.ceil(BODY_R/PS); gx++) {
        const cx = (gx + 0.5)*PS, cy = (gy + 0.5)*PS;
        const d = Math.sqrt(cx*cx + cy*cy);
        if (d > BODY_R) continue;
        ctx.fillStyle = d > BODY_R - PS*1.8 ? '#cc0000' : '#1a0000';
        ctx.fillRect(sx + gx*PS, sy + gy*PS, PS, PS);
      }
    }
    noGlow();
    // Glowing black eye — slightly above centre, no fixed facing direction
    const ehx = sx + PS;
    const ehy = sy - Math.round(HEAD_DIST * 0.7);
    glow('#550000', 10);
    ctx.fillStyle = '#000000';
    ctx.fillRect(ehx - PS, ehy - PS, PS*2, PS*2);
    noGlow();
    ctx.globalAlpha = 1;
  }
}

// ===================== LOOP =====================
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  const now = ts / 1000;
  gameNow = now;
  initGameOverClick();
  if (!gameOver) {
    updateDayNight(dt);
    updateFacing();
    nearbyItem       = getNearbyInteractable();
    nearbyChopTarget = getNearbyChopTarget();
    nearbyMineTarget = getNearbyMineTarget();
    handleInteract();
    handleEat();
    updateMovement(dt);
    updateMobs(dt, now);
    updatePlayerRegen(dt, now);
    updateRespawns(dt);
    if (!inCave) updateSaplings();
    if (inCave) updateCaveRockRespawn();
    updateShadow(dt, now);
    updateParticles(dt);
    checkGameOver();
    updateCamera();
  }
  drawBg();
  if (!inCave) drawGrass();
  if (!inCave) drawSaplings();
  drawGroundItemBodies();
  if (!inCave) drawTreeBases();
  drawRockBases();
  drawCampfires();
  drawTorches();
  drawCraftingStations();
  drawFurnaces();
  if (!inCave) drawMineEntrances();
  if (inCave) drawMineExits();
  drawShadowFigures();
  drawPlayer();
  drawMobs();
  if (!inCave) drawTreeTops();
  drawRockTops();
  drawParticles();
  drawAttackRadius();
  drawCampfirePreview();
  drawTargetIndicators();
  drawNightOverlay();
  drawBorder();
  drawStamina();
  drawPlayerHp();
  drawScore();
  if (inventoryOpen && !gameOver) drawInventory();
  if (mapOpen && !gameOver) drawMap();
  if (gameOver) drawGameOver();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
