<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survival</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07060f;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
    }
    canvas { display: block; }
    .back-btn {
      position: fixed; top: 1rem; right: 1.2rem;
      padding: 0.35rem 1rem; border: 1px solid #a855f7;
      color: #a855f7; font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.08em; text-decoration: none; text-transform: uppercase;
      font-family: monospace; transition: background 0.2s, box-shadow 0.2s;
    }
    .back-btn:hover { background: #a855f720; box-shadow: 0 0 10px #a855f7; }
  </style>
</head>
<body>
  <a class="back-btn" id="backBtn" href="#">Back</a>

  <div id="prompt-display" style="display:none; position:fixed; top:1rem; left:4rem; max-width:240px; z-index:10; pointer-events:none;">
    <p style="color:#a855f7; font-family:monospace; font-size:0.65rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; opacity:0.65; margin-bottom:0.3rem;">Most Recent Prompt</p>
    <p style="color:#7c3aed; font-family:monospace; font-size:0.68rem; line-height:1.55; opacity:0.8;">for diagonal movement, add a slight delay so if you let go when going diagonal, but you let go of one key slightly before the other it stays diagonal. also, add a small list of controls on the bottom left.</p>
  </div>

  <div style="position:fixed; bottom:1rem; left:1.2rem; pointer-events:none; z-index:10;">
    <p style="color:#a855f7; font-family:monospace; font-size:0.6rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; opacity:0.45; margin-bottom:0.3rem;">Controls</p>
    <p style="color:#4b2a6b; font-family:monospace; font-size:0.62rem; line-height:1.7; opacity:0.7;">WASD — face direction</p>
  </div>

  <canvas id="c"></canvas>

<script>
(function() {
  const p = new URLSearchParams(window.location.search);
  document.getElementById('backBtn').href =
    p.get('from') === 'published' ? '../published.html' : '../drafts.html';
  if (p.get('from') === 'drafts')
    document.getElementById('prompt-display').style.display = 'block';
})();

// ===================== SETUP =====================
const W = 880, H = 490;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = W;
canvas.height = H;

function neon(color, blur) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
function noNeon()           { ctx.shadowBlur = 0; }

// ===================== INPUT =====================
const keys      = {};
const released  = {};         // key → timestamp when released
const DIAG_GRACE = 100;       // ms — grace window after releasing a diagonal key

document.addEventListener('keydown', e => {
  if (['w','a','s','d'].includes(e.key.toLowerCase())) e.preventDefault();
  keys[e.key.toLowerCase()] = true;
  delete released[e.key.toLowerCase()];
});
document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  keys[k] = false;
  released[k] = performance.now();
});

// A key counts as active if held, or released within the grace window
function active(k) {
  return keys[k] || (released[k] !== undefined && performance.now() - released[k] < DIAG_GRACE);
}

// ===================== PLAYER =====================
const CX = W / 2, CY = H / 2;
const BODY_R = 18;
const HEAD_R = 7;
const HEAD_DIST = 12;   // distance of head centre from body centre

let facingAngle = -Math.PI / 2;  // default: up

function updateFacing() {
  const dx = (active('d') ? 1 : 0) - (active('a') ? 1 : 0);
  const dy = (active('s') ? 1 : 0) - (active('w') ? 1 : 0);
  if (dx !== 0 || dy !== 0) facingAngle = Math.atan2(dy, dx);
}

// ===================== DRAW =====================
function drawBg() {
  ctx.fillStyle = '#07060f';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#0e0720'; ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawPlayer() {
  // Body
  neon('#a855f7', 20);
  ctx.fillStyle = '#0d0a1a';
  ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(CX, CY, BODY_R, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  noNeon();

  // Head — small circle offset in facing direction
  const hx = CX + Math.cos(facingAngle) * HEAD_DIST;
  const hy = CY + Math.sin(facingAngle) * HEAD_DIST;
  neon('#d8b4fe', 12);
  ctx.fillStyle = '#d8b4fe';
  ctx.beginPath(); ctx.arc(hx, hy, HEAD_R, 0, Math.PI * 2);
  ctx.fill();
  noNeon();
}

// ===================== LOOP =====================
function loop() {
  updateFacing();
  drawBg();
  drawPlayer();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
