<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survival</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07060f;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
    }
    canvas {
      display: block;
      border: 1px solid #2a1050;
      box-shadow: 0 0 12px #1a0838;
    }
    .back-btn {
      position: fixed; top: 1rem; right: 1.2rem;
      padding: 0.35rem 1rem; border: 1px solid #a855f7;
      color: #a855f7; font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.08em; text-decoration: none; text-transform: uppercase;
      font-family: monospace; transition: background 0.2s, box-shadow 0.2s;
    }
    .back-btn:hover { background: #a855f720; box-shadow: 0 0 10px #a855f7; }
  </style>
</head>
<body>
  <a class="back-btn" id="backBtn" href="#">Back</a>

  <div id="prompt-display" style="display:none; position:fixed; top:1rem; left:4rem; max-width:240px; z-index:10; pointer-events:none;">
    <p style="color:#a855f7; font-family:monospace; font-size:0.65rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; opacity:0.65; margin-bottom:0.3rem;">Most Recent Prompt</p>
    <p style="color:#7c3aed; font-family:monospace; font-size:0.68rem; line-height:1.55; opacity:0.8;">they should fit the neon purple style, structurally look like grass, make the pixels slightly bigger and have the tree be MUCH bigger. The player can walk behind most parts of the tree except the bottom of the trunk.</p>
  </div>

  <div style="position:fixed; bottom:1rem; left:1.2rem; pointer-events:none; z-index:10;">
    <p style="color:#a855f7; font-family:monospace; font-size:0.6rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; opacity:0.45; margin-bottom:0.3rem;">Controls</p>
    <p style="color:#4b2a6b; font-family:monospace; font-size:0.62rem; line-height:1.7; opacity:0.7;">WASD — move / face direction<br>Shift — sprint</p>
  </div>

  <canvas id="c"></canvas>

<script>
(function() {
  const p = new URLSearchParams(window.location.search);
  document.getElementById('backBtn').href =
    p.get('from') === 'published' ? '../published.html' : '../drafts.html';
  if (p.get('from') === 'drafts')
    document.getElementById('prompt-display').style.display = 'block';
})();

// ===================== SETUP =====================
const W = 880, H = 490;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = W;
canvas.height = H;

function neon(color, blur) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
function noNeon()           { ctx.shadowBlur = 0; }

// ===================== INPUT =====================
const keys     = {};
const released = {};
const DIAG_GRACE = 50;

document.addEventListener('keydown', e => {
  if (['w','a','s','d'].includes(e.key.toLowerCase())) e.preventDefault();
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'Shift') keys['shift'] = true;
  delete released[e.key.toLowerCase()];
});
document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  keys[k] = false;
  if (e.key === 'Shift') keys['shift'] = false;
  released[k] = performance.now();
});

function active(k) {
  return keys[k] || (released[k] !== undefined && performance.now() - released[k] < DIAG_GRACE);
}

// ===================== WORLD =====================
const CHUNK_W = W, CHUNK_H = H;
const CHUNKS_X = 5, CHUNKS_Y = 7;
const WORLD_W = CHUNK_W * CHUNKS_X;
const WORLD_H = CHUNK_H * CHUNKS_Y;

function chunkRNG(cx, cy) {
  let s = (cx * 73856093 ^ cy * 19349663) >>> 0;
  return function() {
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    return (s >>> 0) / 0x100000000;
  };
}

// ===================== TREE GEOMETRY =====================
const CBS  = 6;   // canopy block size (px)
const CR   = 10;  // canopy radius in blocks (60px radius = 120px diameter)
const TW   = 12;  // trunk width
const TH   = 28;  // trunk height below canopy center
const TRUNK_FRONT = 14; // bottom px of trunk drawn in FRONT of player

// Precompute canopy block rings (at startup, not per frame)
const C_OUTER = [], C_MID = [], C_INNER = [], C_CORE = [];
for (let row = -CR; row <= CR; row++) {
  for (let col = -CR; col <= CR; col++) {
    const d = Math.sqrt(row * row + col * col);
    if (d > CR) continue;
    if      (d > CR - 2)   C_OUTER.push([row, col]);
    else if (d > CR - 5)   C_MID.push([row, col]);
    else if (d > CR - 8)   C_INNER.push([row, col]);
    else                   C_CORE.push([row, col]);
  }
}

// ===================== GRASS GEOMETRY =====================
// Fixed blade offsets — 5 blades per patch, pointing upward
const BLADES = [
  { dx: -7, h: 10, body: '#6b21a8', tip: '#c084fc' },
  { dx: -3, h: 13, body: '#9333ea', tip: '#d8b4fe' },
  { dx:  1, h:  9, body: '#7c3aed', tip: '#c084fc' },
  { dx:  5, h: 12, body: '#6b21a8', tip: '#d8b4fe' },
  { dx:  9, h:  8, body: '#9333ea', tip: '#c084fc' },
];

// ===================== WORLD GENERATION =====================
const worldChunks = [];
for (let cy = 0; cy < CHUNKS_Y; cy++) {
  for (let cx = 0; cx < CHUNKS_X; cx++) {
    const rng = chunkRNG(cx, cy);
    const wx = cx * CHUNK_W, wy = cy * CHUNK_H;

    // 2–4 grass patches
    const grass = [];
    const n = 2 + Math.floor(rng() * 3);
    for (let i = 0; i < n; i++) {
      grass.push({
        x: wx + 30 + Math.floor(rng() * (CHUNK_W - 60)),
        y: wy + 30 + Math.floor(rng() * (CHUNK_H - 60)),
      });
    }

    // 35% tree — kept well away from chunk edges to avoid major clipping
    let tree = null;
    if (rng() < 0.35) {
      tree = {
        x: wx + 100 + Math.floor(rng() * (CHUNK_W - 200)),
        y: wy + 100 + Math.floor(rng() * (CHUNK_H - 200)),
      };
    }

    worldChunks.push({ grass, tree });
  }
}

// ===================== PLAYER =====================
const BODY_R      = 18;
const HEAD_R      = 7;
const HEAD_DIST   = 12;
const SPEED       = 160;
const SPRINT_MULT = 1.75;

let px = WORLD_W / 2, py = WORLD_H / 2;
let facingAngle = -Math.PI / 2;

// ===================== STAMINA =====================
const STAM_MAX         = 100;
const STAM_DRAIN       = 40;
const STAM_REGEN       = 25;
const STAM_REGEN_DELAY = 3;

let stamina      = STAM_MAX;
let staminaReady = false;
let walkingTimer = 0;

// ===================== CAMERA =====================
let camX = 0, camY = 0;

function updateCamera() {
  camX = Math.max(0, Math.min(WORLD_W - W, px - W / 2));
  camY = Math.max(0, Math.min(WORLD_H - H, py - H / 2));
}

// ===================== UPDATE =====================
function updateFacing() {
  const dx = (active('d') ? 1 : 0) - (active('a') ? 1 : 0);
  const dy = (active('s') ? 1 : 0) - (active('w') ? 1 : 0);
  if (dx !== 0 || dy !== 0) facingAngle = Math.atan2(dy, dx);
}

function updateMovement(dt) {
  const moving    = active('w') || active('a') || active('s') || active('d');
  const sprinting = keys['shift'] && moving && stamina > 0;

  if (sprinting) {
    stamina = Math.max(0, stamina - STAM_DRAIN * dt);
    walkingTimer = 0;
    staminaReady = false;
  } else if (!moving) {
    staminaReady = true;
    walkingTimer = 0;
  } else {
    walkingTimer += dt;
    if (walkingTimer >= STAM_REGEN_DELAY) staminaReady = true;
  }
  if (staminaReady && stamina < STAM_MAX)
    stamina = Math.min(STAM_MAX, stamina + STAM_REGEN * dt);

  if (!moving) return;
  const speed = sprinting ? SPEED * SPRINT_MULT : SPEED;
  px += Math.cos(facingAngle) * speed * dt;
  py += Math.sin(facingAngle) * speed * dt;
  px = Math.max(BODY_R, Math.min(WORLD_W - BODY_R, px));
  py = Math.max(BODY_R, Math.min(WORLD_H - BODY_R, py));
}

// ===================== DRAW =====================
const GRID = 40;

function drawBg() {
  ctx.fillStyle = '#07060f';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = '#0e0720'; ctx.lineWidth = 0.5;
  const ox = camX % GRID, oy = camY % GRID;
  for (let x = -ox; x < W; x += GRID) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = -oy; y < H; y += GRID) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  ctx.strokeStyle = '#1e0f38'; ctx.lineWidth = 1;
  for (let cx = 0; cx <= CHUNKS_X; cx++) {
    const sx = cx * CHUNK_W - camX;
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, H); ctx.stroke();
  }
  for (let cy = 0; cy <= CHUNKS_Y; cy++) {
    const sy = cy * CHUNK_H - camY;
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
  }
}

function drawBorder() {
  const bx = -camX, by = -camY;
  neon('#a855f7', 22);
  ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 4;
  ctx.strokeRect(bx, by, WORLD_W, WORLD_H);
  noNeon();
}

// Grass patches (drawn below player)
function drawGrass() {
  for (const chunk of worldChunks) {
    for (const g of chunk.grass) {
      const sx = g.x - camX, sy = g.y - camY;
      if (sx < -30 || sx > W + 30 || sy < -30 || sy > H + 30) continue;
      for (const b of BLADES) {
        // Body
        ctx.fillStyle = b.body;
        ctx.fillRect(sx + b.dx, sy - b.h, 2, b.h);
        // Tip (top 3px brighter)
        ctx.fillStyle = b.tip;
        ctx.fillRect(sx + b.dx, sy - b.h, 2, 3);
      }
    }
  }
}

// Tree trunk base — drawn BEFORE player so player walks in front of it
function drawTreeBases() {
  for (const chunk of worldChunks) {
    if (!chunk.tree) continue;
    const t = chunk.tree;
    const sx = Math.round(t.x - camX);
    const sy = Math.round(t.y - camY);
    if (sx < -80 || sx > W + 80 || sy < -80 || sy > H + 80) continue;

    // Trunk base: bottom TRUNK_FRONT pixels of trunk
    const trunkBotY = sy + CR * CBS / 2 + TH;          // world bottom of trunk (screen)
    const trunkTopY = trunkBotY - TH;
    const splitY    = trunkBotY - TRUNK_FRONT;          // split point

    ctx.fillStyle = '#0d051a';
    ctx.fillRect(sx - TW / 2, splitY, TW, TRUNK_FRONT);
    // Subtle edge highlight on sides
    ctx.fillStyle = '#1e0a38';
    ctx.fillRect(sx - TW / 2, splitY, 2, TRUNK_FRONT);
    ctx.fillRect(sx + TW / 2 - 2, splitY, 2, TRUNK_FRONT);
  }
}

// Tree canopy + upper trunk — drawn AFTER player so player walks behind them
function drawTreeCanopies() {
  for (const chunk of worldChunks) {
    if (!chunk.tree) continue;
    const t = chunk.tree;
    const sx = Math.round(t.x - camX);
    const sy = Math.round(t.y - camY);
    if (sx < -80 || sx > W + 80 || sy < -80 || sy > H + 80) continue;

    const trunkBotY = sy + CR * CBS / 2 + TH;
    const splitY    = trunkBotY - TRUNK_FRONT;

    // Upper trunk (above split)
    ctx.fillStyle = '#0d051a';
    ctx.fillRect(sx - TW / 2, sy + CR * CBS / 2, TW, TH - TRUNK_FRONT);
    ctx.fillStyle = '#1e0a38';
    ctx.fillRect(sx - TW / 2, sy + CR * CBS / 2, 2, TH - TRUNK_FRONT);
    ctx.fillRect(sx + TW / 2 - 2, sy + CR * CBS / 2, 2, TH - TRUNK_FRONT);

    // Canopy — outer edge glow pass
    neon('#3b1a6b', 8);
    ctx.fillStyle = '#1a0838';
    for (const [row, col] of C_OUTER)
      ctx.fillRect(sx + col * CBS, sy + row * CBS, CBS, CBS);
    noNeon();

    // Canopy — remaining rings
    ctx.fillStyle = '#220d42';
    for (const [row, col] of C_MID)
      ctx.fillRect(sx + col * CBS, sy + row * CBS, CBS, CBS);

    ctx.fillStyle = '#2e1256';
    for (const [row, col] of C_INNER)
      ctx.fillRect(sx + col * CBS, sy + row * CBS, CBS, CBS);

    ctx.fillStyle = '#1e0a38';
    for (const [row, col] of C_CORE)
      ctx.fillRect(sx + col * CBS, sy + row * CBS, CBS, CBS);

    // Subtle highlight dots scattered near center
    ctx.fillStyle = '#4a1a70';
    ctx.fillRect(sx - CBS,     sy - CBS * 2, CBS, CBS);
    ctx.fillRect(sx + CBS * 2, sy,           CBS, CBS);
    ctx.fillRect(sx - CBS * 3, sy + CBS,     CBS, CBS);
  }
}

function drawPlayer() {
  const sx = px - camX, sy = py - camY;

  neon('#a855f7', 20);
  ctx.fillStyle = '#0d0a1a';
  ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(sx, sy, BODY_R, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  noNeon();

  const hx = sx + Math.cos(facingAngle) * HEAD_DIST;
  const hy = sy + Math.sin(facingAngle) * HEAD_DIST;
  neon('#d8b4fe', 12);
  ctx.fillStyle = '#d8b4fe';
  ctx.beginPath(); ctx.arc(hx, hy, HEAD_R, 0, Math.PI * 2);
  ctx.fill();
  noNeon();
}

function drawStamina() {
  const BAR_W = 100, BAR_H = 6;
  const bx = 14, by = H - 24;
  const fill  = (stamina / STAM_MAX) * BAR_W;
  const color = keys['shift'] && stamina > 0 ? '#00d4ff'
              : staminaReady                  ? '#a855f7'
                                              : '#3b1a6b';

  ctx.fillStyle = '#0d0a1a';
  ctx.fillRect(bx, by, BAR_W, BAR_H);
  if (fill > 0) {
    neon(color, keys['shift'] ? 10 : 6);
    ctx.fillStyle = color;
    ctx.fillRect(bx, by, fill, BAR_H);
    noNeon();
  }
  ctx.strokeStyle = '#2a1050'; ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, BAR_W, BAR_H);
}

// ===================== LOOP =====================
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  updateFacing();
  updateMovement(dt);
  updateCamera();
  drawBg();
  drawGrass();
  drawTreeBases();   // trunk base — in front of player
  drawPlayer();
  drawTreeCanopies(); // canopy + upper trunk — behind player
  drawBorder();
  drawStamina();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
